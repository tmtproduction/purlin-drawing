<script>
'use strict';

/* ═══════════════════════════════════════════════════
   FIREBASE AUTH + PROJECT SYSTEM
═══════════════════════════════════════════════════ */
let _fbUser=null, _fbRole=null, _loadOpen=false, _myDocs={};
let _approved=false; // global gate

window.addEventListener('load',()=>{
  if(!window.$fn) return;
  window.$fn.onAuthStateChanged(window.$auth,async user=>{
    _fbUser=user;
    if(user){
      await _ensureUserDoc(user);
      const profile=await _getUserProfile(user.uid);
      _fbRole=profile?.role||'engineer';
      const status=profile?.status||'pending';
      _approved=(status==='approved');
      _updateAuthUI(user,_fbRole,status);
    } else {
      _fbRole=null; _approved=false;
      _updateAuthUI(null);
    }
  });
});

function _updateAuthUI(user,role,status){
  const show=id=>document.getElementById(id).style.display='';
  const hide=id=>document.getElementById(id).style.display='none';
  const overlay=document.getElementById('auth-overlay');
  const aoIcon=document.getElementById('ao-icon');
  const aoTitle=document.getElementById('ao-title');
  const aoSub=document.getElementById('ao-sub');
  const aoAction=document.getElementById('ao-action');

  // ── ไม่ได้ login ──
  if(!user){
    overlay.style.display='flex';
    aoIcon.textContent='🔒';
    aoTitle.textContent='Z / C Purlin Drawing';
    aoSub.textContent='กรุณาเข้าสู่ระบบก่อนใช้งาน';
    aoAction.innerHTML=`<button onclick="doSignIn()"
      style="background:#58a6ff;color:#000;border:none;padding:10px 28px;
      border-radius:4px;font-family:'Rajdhani',sans-serif;font-weight:700;
      font-size:14px;cursor:pointer;letter-spacing:1px">
      🔑 Sign in with Google
    </button>`;
    show('ab-signin');
    ['ab-save','ab-load','ab-admin','ab-signout'].forEach(hide);
    document.getElementById('ab-userinfo').textContent='';
    return;
  }

  hide('ab-signin'); show('ab-load'); show('ab-signout');

  // ── Pending ──
  if(status==='pending'){
    overlay.style.display='flex';
    aoIcon.textContent='⏳';
    aoTitle.textContent='รอการอนุมัติ';
    aoSub.innerHTML=`${user.email}<br><span style="font-size:11px;color:#6e7681">Admin จะอนุมัติภายใน 1 วันทำการ</span>`;
    aoAction.innerHTML=`<button onclick="doSignOut()"
      style="background:transparent;border:1px solid #21262d;color:#8b949e;
      padding:6px 18px;border-radius:4px;font-size:12px;cursor:pointer">
      Sign out
    </button>`;
    document.getElementById('ab-userinfo').textContent=`⏳ รอ Admin อนุมัติ (${user.email})`;
    ['ab-save','ab-admin'].forEach(hide);
    return;
  }

  // ── Rejected ──
  if(status==='rejected'){
    overlay.style.display='flex';
    aoIcon.textContent='❌';
    aoTitle.textContent='ถูกปฏิเสธสิทธิ์';
    aoSub.textContent=`${user.email}`;
    aoAction.innerHTML=`<button onclick="doSignOut()"
      style="background:transparent;border:1px solid #21262d;color:#8b949e;
      padding:6px 18px;border-radius:4px;font-size:12px;cursor:pointer">
      Sign out
    </button>`;
    document.getElementById('ab-userinfo').textContent=`❌ ถูกปฏิเสธสิทธิ์ (${user.email})`;
    ['ab-save','ab-admin'].forEach(hide);
    return;
  }

  // ── Approved ──
  overlay.style.display='none';
  document.getElementById('ab-userinfo').textContent=`${user.displayName}  [${role}]`;
  if(role!=='operator') show('ab-save'); else hide('ab-save');
  if(role==='admin') show('ab-admin'); else hide('ab-admin');
}

// Slot dimensions
const SLOT_DH=18, SLOT_WH=22;

function getTMTRow(H){
  if(_catGL) return{GL:_catGL};
  const map={76:38,102:40,127:55,152:60,203:110,254:160};
  const keys=Object.keys(map).map(Number).sort((a,b)=>a-b);
  const best=keys.reduce((p,c)=>Math.abs(c-H)<Math.abs(p-H)?c:p);
  return{GL:map[best]};
}



/* H1: 2 slots on web, symmetric about H/2, C-to-C = GL
   Returns [{Y, face, slot}, {Y, face, slot}]
*/
function h1Holes(H){
  const row=getTMTRow(H);
  const gl=row.GL;
  const y1=H/2-gl/2;  // lower slot (from bottom)
  const y2=H/2+gl/2;  // upper slot (from bottom)
  return[
    {Y:Math.round(y1*10)/10, face:'WEB', slot:true, dia:SLOT_DH, slotW:SLOT_WH, glSpan:gl},
    {Y:Math.round(y2*10)/10, face:'WEB', slot:true, dia:SLOT_DH, slotW:SLOT_WH},
  ];
}

/* H2: 1 slot on B1 (TOP), 1 slot on B2 (BOT)
   Returns [{face:'TOP', slot}, {face:'BOT', slot}]
*/
function h2Holes(){
  return[
    {Y:0, face:'TOP', slot:true, dia:SLOT_DH, slotW:SLOT_WH},
    {Y:0, face:'BOT', slot:true, dia:SLOT_DH, slotW:SLOT_WH},
  ];
}

/* H3: 1 circle at web centre */
function h3Holes(H){
  return[{Y:Math.round(H/2), face:'WEB', slot:false, dia:18}];
}

/* Auto-Y display for Y input field (single representative value) */
function lookupY(holeType, H){
  const row=getTMTRow(H);
  if(holeType==='H1') return `${fmt(H/2-row.GL/2)} / ${fmt(H/2+row.GL/2)}`;
  if(holeType==='H2') return 'B1+B2';
  if(holeType==='H3') return fmt(Math.round(H/2));
  return fmt(Math.round(H/2));
}

/* Lookup dia display */
function lookupDia(holeType){
  if(holeType==='H3') return 'Ø18';
  return `${SLOT_DH}×${SLOT_WH}`; // H1, H2
}
function lookupDiaNum(holeType){ return holeType==='H3' ? 18 : SLOT_DH; }
function isSlot(holeType){ return holeType!=='H3'; }

/* ── CONSTANTS ── */
const SW=1190,SH=841;
const MONO='Share Tech Mono,monospace';
const CDIM='#222';   // dimension line color (dark, like CAD)
const COUT='#000';
const CTHIN='#666';

const r=(n,d=1)=>Math.round(n*10**d)/10**d;
const fmt=n=>(n===Math.round(n))?String(n):n.toFixed(1).replace(/\.0$/,'');
const today=()=>{const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ── SVG PRIMITIVES ── */
const SL=(x1,y1,x2,y2,c,w,dash='')=>
  `<line x1="${r(x1)}" y1="${r(y1)}" x2="${r(x2)}" y2="${r(y2)}" stroke="${c}" stroke-width="${w}"${dash?` stroke-dasharray="${dash}"`:''}/>`;
const SR=(x,y,w,h,c,sw,f='none')=>
  `<rect x="${r(x)}" y="${r(y)}" width="${r(w,0)}" height="${r(h,0)}" stroke="${c}" stroke-width="${sw}" fill="${f}"/>`;
const SC=(cx,cy,rad,c,sw,f='none')=>
  `<circle cx="${r(cx)}" cy="${r(cy)}" r="${r(rad,2)}" stroke="${c}" stroke-width="${sw}" fill="${f}"/>`;
const ST=(x,y,str,sz,anc='middle',c='#000',wt='normal',xf='')=>
  `<text x="${r(x)}" y="${r(y)}" font-family="${MONO}" font-size="${sz}" text-anchor="${anc}" fill="${c}" font-weight="${wt}"${xf?` transform="${xf}"`:''}>${esc(str)}</text>`;

/* Filled arrowhead */
const ARR=(x,y,dx,dy,c=CDIM)=>{
  const h=Math.hypot(dx,dy),nx=dx/h,ny=dy/h,px=-ny,py=nx,len=6,bw=2.2;
  return`<polygon points="${r(x)},${r(y)} ${r(x-nx*len+px*bw)},${r(y-ny*len+py*bw)} ${r(x-nx*len-px*bw)},${r(y-ny*len-py*bw)}" fill="${c}" stroke="none"/>`;
};

/* ════════════════════════════════════════════
   DIMENSION FUNCTIONS — ตามมาตรฐานบทที่ 7
   ตำรา Fundamental of Engineering Drawing
════════════════════════════════════════════

   กฎสำคัญ:
   1. Extension line: เว้น 1.5px จากขอบรูป, เลย dim line 2px
   2. Dimension line: บาง (0.45), มีหัวลูกศรสองด้าน
   3. ตัวเลข: อยู่เหนือ dim line ~1.5px, ตรงกลาง (aligned style)
   4. ถ้าช่องแคบ: ตัวเลขออกนอก extension line พร้อม leader
   5. Leader line: เอียง 30-60°, หัวลูกศรจรดขอบรู ห้ามชี้ศูนย์กลาง
   6. ไม่บอกขนาดซ้ำซ้อน
*/

// Horizontal dim — with proper extension lines
// originY = Y ของขอบรูป (extension line เริ่มจากนี้เว้น 1.5px)
// dimY    = Y ของ dimension line
function DH(x1,x2,dimY,lbl,c=CDIM,originY=null){
  const span=Math.abs(x2-x1), mid=(x1+x2)/2;
  const GAP=1.5, OVER=2;
  let s='';

  // Extension lines
  if(originY!==null){
    const goUp=dimY<originY;
    const y0=goUp?originY-GAP:originY+GAP;
    const y1=goUp?dimY-OVER:dimY+OVER;
    s+=SL(x1,y0,x1,y1,c,.4);
    s+=SL(x2,y0,x2,y1,c,.4);
  } else {
    s+=SL(x1,dimY-5,x1,dimY+5,c,.4);
    s+=SL(x2,dimY-5,x2,dimY+5,c,.4);
  }

  // Arrowheads (เสมอ)
  s+=ARR(x1,dimY,1,0,c)+ARR(x2,dimY,-1,0,c);

  const sz=span<22?6:span<45?7:8;
  const lblW=lbl.length*sz*0.62;

  if(span < lblW+12){
    // แคบเกิน → เส้นเต็ม + text ออกขวา
    s+=SL(x1,dimY,x2,dimY,c,.45);
    s+=SL(x2+2,dimY,x2+10,dimY,c,.35);
    s+=ST(x2+12,dimY+3,lbl,7,'start',c);
  } else {
    // BREAK LINE: ตัดเส้นตรงกลาง เว้นช่องให้ label
    const hg=lblW/2+3;
    s+=SL(x1,dimY,mid-hg,dimY,c,.45);
    s+=SL(mid+hg,dimY,x2,dimY,c,.45);
    s+=ST(mid,dimY-3,lbl,sz,'middle',c);
  }
  return s;
}

function DV(dimX,y1,y2,lbl,c=CDIM,originX=null,lblSz=7.5){
  const span=Math.abs(y2-y1), mid=(y1+y2)/2;
  const GAP=1.5, OVER=2;
  const goLeft=originX===null||(dimX<originX);
  let s='';

  // Extension lines
  if(originX!==null){
    const x0=goLeft?originX-GAP:originX+GAP;
    const x1e=goLeft?dimX-OVER:dimX+OVER;
    s+=SL(x0,y1,x1e,y1,c,.4);
    s+=SL(x0,y2,x1e,y2,c,.4);
  } else {
    s+=SL(dimX-5,y1,dimX+5,y1,c,.4);
    s+=SL(dimX-5,y2,dimX+5,y2,c,.4);
  }

  // Arrowheads (เสมอ)
  s+=ARR(dimX,y1,0,1,c)+ARR(dimX,y2,0,-1,c);

  // Label
  const lblH=lbl.length*lblSz*0.62; // ความสูงของ text เมื่อหมุน -90°

  if(span<16){
    // แคบมาก → ออกด้านข้าง horizontal
    s+=SL(dimX,y1,dimX,y2,c,.45);
    const lx=goLeft?dimX-13:dimX+13;
    s+=SL(dimX,mid,lx,mid,c,.3);
    s+=ST(lx+(goLeft?-2:2),mid+3,lbl,Math.max(lblSz-1,6),goLeft?'end':'start',c);
  } else if(span < lblH+12){
    // แคบเกิน → เส้นเต็ม + text ออกด้านข้าง
    s+=SL(dimX,y1,dimX,y2,c,.45);
    const lx=goLeft?dimX-13:dimX+13;
    s+=SL(dimX,mid,lx,mid,c,.3);
    s+=ST(lx+(goLeft?-2:2),mid+3,lbl,Math.max(lblSz-1,6),goLeft?'end':'start',c);
  } else {
    // BREAK LINE: ตัดเส้นตรงกลาง เว้นช่องให้ label
    const hg=lblH/2+3;
    s+=SL(dimX,y1,dimX,mid-hg,c,.45);
    s+=SL(dimX,mid+hg,dimX,y2,c,.45);
    // text อยู่กึ่งกลางช่องที่ตัด หมุน -90°
    s+=ST(dimX,mid,lbl,lblSz,'middle',c,'normal',`rotate(-90,${r(dimX)},${r(mid)})`);
  }
  return s;
}

/* ── CHAIN DIMENSION (ตามมาตรฐาน)
   - เส้น extension line ลากจาก originY เว้น GAP
   - ตัวเลขอยู่เหนือ dim line
   - ถ้าช่องแคบ: ยก lane ขึ้น (stagger)
   - ไม่มีเส้น dim ซ้อนทับกัน
── */
const LANE_H=16;

function chainDim(pts, dimY, c=CDIM, originY=null){
  if(pts.length<2) return '';
  const GAP=1.5, OVER=2;

  const segs=[];
  for(let i=0;i<pts.length-1;i++){
    segs.push({x1:pts[i].x, x2:pts[i+1].x, lbl:pts[i+1].lbl||''});
  }

  // Greedy lane-packing
  const laneEdge=[];
  segs.forEach(seg=>{
    const lblW=seg.lbl.length*6.5+8;
    const need=Math.max(seg.x2-seg.x1, lblW);
    let lane=0;
    while(lane<laneEdge.length && (laneEdge[lane]||0)+2>seg.x1) lane++;
    laneEdge[lane]=seg.x1+need;
    seg.lane=lane;
  });

  let s='';
  const goUp=originY===null||(dimY<originY);

  // Extension lines from object edge to baseline (lane 0)
  pts.forEach(p=>{
    if(originY!==null){
      const y0=goUp?originY-GAP:originY+GAP;
      const y1=goUp?dimY-OVER:dimY+OVER;
      s+=SL(p.x,y0,p.x,y1,c,.4);
    } else {
      const y0=goUp?dimY+6:dimY-6;
      const y1=goUp?dimY-OVER:dimY+OVER;
      s+=SL(p.x,y0,p.x,y1,c,.4);
    }
  });

  // Baseline
  s+=SL(pts[0].x,dimY,pts[pts.length-1].x,dimY,c,.45);

  segs.forEach(({x1,x2,lbl,lane})=>{
    if(!lbl) return;
    const sign=goUp?-1:1;
    const y=dimY+sign*(lane*LANE_H);
    const mid=(x1+x2)/2;
    const span=x2-x1;

    if(lane>0){
      // Staggered: extra extension lines up to this lane
      s+=SL(x1,dimY,x1,y,c,.3,'3,2');
      s+=SL(x2,dimY,x2,y,c,.3,'3,2');
      s+=SL(x1,y,x2,y,c,.45);
    }
    s+=ARR(x1,y,1,0,c)+ARR(x2,y,-1,0,c);

    const sz=span<22?6:span<50?7:8;
    const lblW=lbl.length*sz*0.62;
    if(span<lblW+12){
      // แคบ → ออกนอก
      s+=SL(x1,y,x2,y,c,.45);
      s+=SL(x2+2,y,x2+8,y,c,.3);
      s+=ST(x2+10,y+3,lbl,7,'start',c);
    } else {
      // BREAK LINE: ตัดเส้นตรงกลาง เว้นช่อง label
      const hg=lblW/2+3;
      s+=SL(x1,y,mid-hg,y,c,.45);
      s+=SL(mid+hg,y,x2,y,c,.45);
      s+=ST(mid,y-3*sign,lbl,sz,'middle',c);
    }
  });
  return s;
}

/* ── LEADER LINE + NOTE (ตามมาตรฐาน section 7.2, 7.3.5)
   หัวลูกศรจรดที่ "ขอบของรู" ไม่ใช่จุดศูนย์กลาง
   เส้นเอียง 30-60° จาก horizontal
   ปลายอีกด้านเป็นเส้นนอนสั้น แล้วเขียน note บน
── */
function leaderNote(hx,hy,hRad,noteText,side='left',c=CDIM){
  // side = 'left' หรือ 'right' → ทิศทาง leader ออก
  const ANGLE=Math.PI*(side==='left'?150:30)/180; // 150° หรือ 30° จาก +x
  const LEADER_LEN=22;
  const HORIZ=18;

  // จุดที่ขอบรู (หัวลูกศรหยุดตรงนี้)
  const edgeX=hx+Math.cos(ANGLE)*hRad;
  const edgeY=hy+Math.sin(ANGLE)*hRad;

  // จุดหักมุม (บริเวณที่เส้นเฉียงสิ้นสุด)
  const kinkX=hx+Math.cos(ANGLE)*(hRad+LEADER_LEN);
  const kinkY=hy+Math.sin(ANGLE)*(hRad+LEADER_LEN);

  // เส้นนอนสั้น
  const horizEndX=side==='left'?kinkX-HORIZ:kinkX+HORIZ;

  let s='';
  // เส้นเฉียง (ลากจาก edge → kink)
  s+=SL(edgeX,edgeY,kinkX,kinkY,c,.45);
  // เส้นนอน
  s+=SL(kinkX,kinkY,horizEndX,kinkY,c,.45);
  // หัวลูกศรที่ขอบรู
  s+=ARR(edgeX,edgeY,Math.cos(ANGLE),Math.sin(ANGLE),c);
  // ข้อความบนเส้นนอน (เหนือ 1.5px)
  const txtX=(kinkX+horizEndX)/2;
  s+=ST(txtX,kinkY-2.5,noteText,8.5,'middle',c);

  return s;
}

/* ── HOLE TYPE STYLE MAP ──
   กำหนดสี stroke/fill และ symbol สำหรับแต่ละ type
── */
const HOLE_STYLE={
  H1:{stroke:'#1a5c8a', fill:'#e8f4fd'},
  H2:{stroke:'#6b1a8a', fill:'#f4e8fd'},
  H3:{stroke:'#1a6b2e', fill:'#e8fded'},
  default:{stroke:COUT, fill:'white'}
};
function holeStyle(holeType){
  return HOLE_STYLE[holeType]||HOLE_STYLE.default;
}

/* ── PILL CALLOUT (single) ── */
function pillCallout(ox,oy,text,hx,hy,holeType){
  const cw=5.5, bh=15, pad=9;
  const bw=Math.max(text.length*cw+pad*2,60);
  const hs=holeStyle(holeType);
  let s=`<rect x="${r(ox-bw/2)}" y="${r(oy-bh/2)}" width="${r(bw)}" height="${bh}" rx="${bh/2}" fill="${hs.fill}" stroke="${hs.stroke}" stroke-width="0.9"/>`;
  s+=ST(ox,oy+4.5,text,8.5,'middle',hs.stroke,'bold');
  if(hx!==undefined){
    const ang=Math.atan2(hy-oy,hx-ox);
    const ex=ox+Math.cos(ang)*(bw/2+1), ey=oy+Math.sin(ang)*(bh/2+1);
    s+=SL(ex,ey,hx,hy,hs.stroke,.65);
    s+=SC(hx,hy,2.5,hs.stroke,.6,hs.stroke);
  }
  return s;
}

/* ── COLLISION BOX REGISTRY ── */
let _cboxes=[];
// Register a rectangle as occupied (prevents callouts from placing there)
function blockBox(cx,cy,bw,bh){
  _cboxes.push([cx-bw/2, cx+bw/2, cy-bh/2, cy+bh/2]);
}
// Register a circle as occupied
function blockCircle(cx,cy,rad){
  _cboxes.push([cx-rad-2, cx+rad+2, cy-rad-2, cy+rad+2]);
}
function hitsBox(ox,oy,bw,bh,M=3){
  return _cboxes.some(([l,rr,t,b])=>
    !(ox+bw/2+M<l || ox-bw/2-M>rr || oy+bh/2+M<t || oy-bh/2-M>b));
}

/* ── RIBBON CALLOUT (multi-hole grouped) ──
   bracket ครอบกลุ่มรู + pill label
   - bracket verticals บาง, horizontal หนากว่า
   - leader ลากจาก leaderAnchorX (ไม่ผ่านรู)
   - collision-aware: ARM ขยับจนไม่ชน
── */
function ribbonCallout(x1,x2,y,text,above=true,holeType){
  const mid=(x1+x2)/2;
  const cw=5.5, bh=15, pad=9;
  const bw=Math.max(text.length*cw+pad*2,65);
  const sign=above?-1:1;
  const hs=holeStyle(holeType);

  // clamp pill X
  const pillX=Math.max(bw/2+4, Math.min(SW-bw/2-4, mid));

  // Find arm length ที่ไม่ชน
  let ARM=22;
  for(let tries=0;tries<8;tries++){
    const pillY=y+sign*(ARM+20);
    if(!hitsBox(pillX,pillY,bw,bh)){break;}
    ARM+=18;
  }

  const barY=y+sign*ARM;
  const pillY=barY+sign*20;

  // Leader anchor: clamp ให้อยู่ใต้ bracket ไม่ผ่านรู
  const leaderAnchorX=Math.max(x1, Math.min(x2, pillX));
  const leaderEndY=above?pillY+bh/2:pillY-bh/2;

  let s='';
  // Bracket verticals — บาง
  s+=SL(x1,y,x1,barY,hs.stroke,.5);
  s+=SL(x2,y,x2,barY,hs.stroke,.5);
  // Bracket horizontal — หนากว่า
  s+=SL(x1,barY,x2,barY,hs.stroke,.9);
  // Leader dashed
  s+=SL(leaderAnchorX,barY,pillX,leaderEndY,hs.stroke,.5,'3,2');

  // Pill
  s+=`<rect x="${r(pillX-bw/2)}" y="${r(pillY-bh/2)}" width="${r(bw)}" height="${bh}" rx="${bh/2}" fill="${hs.fill}" stroke="${hs.stroke}" stroke-width="0.9"/>`;
  s+=ST(pillX,pillY+4.5,text,8.5,'middle',hs.stroke,'bold');

  blockBox(pillX,pillY,bw,bh);
  return s;
}

/* ── SMART GROUPED CALLOUT ──
   รูในแถว Y เดียวกันที่ห่างกัน < MERGE_PX → ribbon
   รูอยู่คนเดียว → pill
── */
const MERGE_PX=60;

function renderHoleCallouts(holeGroups, above=true){
  if(!holeGroups.length) return '';
  let s='';
  const sorted=[...holeGroups].sort((a,b)=>a.hx-b.hx);
  const clusters=[];
  let cur=[sorted[0]];
  for(let i=1;i<sorted.length;i++){
    if(sorted[i].hx-cur[cur.length-1].hx<MERGE_PX) cur.push(sorted[i]);
    else{clusters.push(cur);cur=[sorted[i]];}
  }
  clusters.push(cur);

  // Separate SVG: callouts first, then dots on top
  let dotsSVG='';
  clusters.forEach(cluster=>{
    const clusterHoleType=cluster[0].holeType;
    if(cluster.length===1){
      const {hx,hy,lbl,holeType}=cluster[0];
      s+=placeCalloutSingle(hx,hy,lbl,above,holeType);
      const hs=holeStyle(holeType);
      dotsSVG+=SC(hx,hy,2.5,hs.stroke,.6,hs.stroke);
    } else {
      const x1=cluster[0].hx, x2=cluster[cluster.length-1].hx;
      const y=cluster[0].hy;
      // นับ qty รวมของ cluster — แต่ละ entry ใน cluster คือ 1 hole row
      // H1 มี 2 Y rows ที่ X เดียวกัน → totalQty = จำนวนรูจริง (qty * 2 สำหรับ H1 pair)
      const totalQty=cluster.reduce((sum,h)=>sum+(h.qty||1),0);
      const dia=cluster[0].dia||SLOT_DH;
      const isSlotCluster=cluster.every(h=>h.slot!==false);
      const lbl=isSlotCluster
        ?`${totalQty}-(${SLOT_DH}×${SLOT_WH}) Slot.`
        :`${totalQty}-Ø${fmt(dia)} Hole.`;
      s+=ribbonCallout(x1,x2,y,lbl,above,clusterHoleType);
      cluster.forEach(h=>{
        const hs=holeStyle(h.holeType);
        dotsSVG+=SC(h.hx,h.hy,2.5,hs.stroke,.6,hs.stroke);
      });
    }
  });
  return s+dotsSVG; // dots render after callouts
}

/* ── SINGLE PILL (collision-aware) ── */
function placeCalloutSingle(hx,hy,lbl,preferAbove=true,holeType){
  const cw=5.5,bh=15,pad=9;
  const bw=Math.max(lbl.length*cw+pad*2,60);
  const M=3;
  const clampX=ox=>Math.max(bw/2+M, Math.min(SW-bw/2-M, ox));
  function tryAt(ox,oy){
    const cx=clampX(ox);
    if(!hitsBox(cx,oy,bw,bh,M)){
      blockBox(cx,oy,bw,bh);
      return pillCallout(cx,oy,lbl,hx,hy,holeType);
    }
    return null;
  }
  const BASE=26,STEP=18;
  // Expand candidate positions — prefer side with more space, add more steps
  const oys=preferAbove
    ?[hy-BASE,hy-BASE-STEP,hy-BASE-STEP*2,hy-BASE-STEP*3,hy-BASE-STEP*4,
      hy+BASE,hy+BASE+STEP,hy+BASE+STEP*2]
    :[hy+BASE,hy+BASE+STEP,hy+BASE+STEP*2,hy+BASE+STEP*3,hy+BASE+STEP*4,
      hy-BASE,hy-BASE-STEP,hy-BASE-STEP*2];
  const oxs=[hx,hx+bw*0.4,hx-bw*0.4,hx+bw*0.8,hx-bw*0.8];
  for(const coy of oys)for(const cox of oxs){const res=tryAt(cox,coy);if(res)return res;}
  // Last-resort: keep going further in preferred direction
  for(let ex=5;ex<=10;ex++){
    const fallY=preferAbove?hy-BASE-STEP*ex:hy+BASE+STEP*ex;
    const res=tryAt(hx,fallY); if(res) return res;
  }
  const cx=clampX(oxs[0]),coy=oys[oys.length-1];
  blockBox(cx,coy,bw,bh);
  return pillCallout(cx,coy,lbl,hx,hy,holeType);
}

/* ── C SECTION PROFILE
   - Web: แนวตั้ง (ox,oy = จุดล่างสุดของ web)
   - B1 (top flange): ยื่นออกขวา (+x), lip พับลง (+y เข้าหา web)
   - B2 (bot flange): ยื่นออกขวา (+x), lip พับขึ้น (−y เข้าหา web)
── */
function cProfile(ox,oy,H,B1,B2,D,sc,stroke=1.8){
  const sH=H*sc, sB=B1*sc, sD=D*sc; // C: B1=B2=F
  const R=Math.min(4*sc, sD*0.4, sB*0.15);
  const d=[
    // start: top lip tip
    `M ${r(ox+sB)} ${r(oy-sH+sD)}`,
    // up to top-right corner (lip base)
    `L ${r(ox+sB)} ${r(oy-sH+R)}`,
    `Q ${r(ox+sB)} ${r(oy-sH)} ${r(ox+sB-R)} ${r(oy-sH)}`,
    // across top flange to web top-left
    `L ${r(ox+R)} ${r(oy-sH)}`,
    `Q ${r(ox)} ${r(oy-sH)} ${r(ox)} ${r(oy-sH+R)}`,
    // down web
    `L ${r(ox)} ${r(oy-R)}`,
    // web bottom-left corner
    `Q ${r(ox)} ${r(oy)} ${r(ox+R)} ${r(oy)}`,
    // across bottom flange to bottom-right corner
    `L ${r(ox+sB-R)} ${r(oy)}`,
    `Q ${r(ox+sB)} ${r(oy)} ${r(ox+sB)} ${r(oy-R)}`,
    // up to bottom lip tip
    `L ${r(ox+sB)} ${r(oy-sD)}`,
  ].join(' ');
  return`<path d="${d}" stroke="${COUT}" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
}

/* Legacy wrapper */
function placeCallout(hx,hy,lbl,preferAbove=true,holeType){
  return placeCalloutSingle(hx,hy,lbl,preferAbove,holeType);
}

/* ── Z SECTION PROFILE — ตามรูป reference (rounded corners) ── */
function zProfile(ox,oy,H,B1,B2,D,sc,stroke=1.8){
  const sH=H*sc, sB1=B1*sc, sB2=B2*sc, sD=D*sc;
  const R=Math.min(4*sc, sD*0.4, sB1*0.15, sB2*0.15);
  const d=[
    `M ${r(ox-sB1)} ${r(oy-sH+sD)}`,
    `L ${r(ox-sB1)} ${r(oy-sH+R)}`,
    `Q ${r(ox-sB1)} ${r(oy-sH)} ${r(ox-sB1+R)} ${r(oy-sH)}`,
    `L ${r(ox-R)}   ${r(oy-sH)}`,
    `Q ${r(ox)}     ${r(oy-sH)} ${r(ox)} ${r(oy-sH+R)}`,
    `L ${r(ox)}     ${r(oy-R)}`,
    `Q ${r(ox)} ${r(oy)} ${r(ox+R)} ${r(oy)}`,
    `L ${r(ox+sB2-R)} ${r(oy)}`,
    `Q ${r(ox+sB2)} ${r(oy)} ${r(ox+sB2)} ${r(oy-R)}`,
    `L ${r(ox+sB2)} ${r(oy-sD)}`,
  ].join(' ');
  return`<path d="${d}" stroke="${COUT}" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
}

/* ── C SECTION PROFILE — symmetric C shape
   - B1=B2=F (both flanges same width, same direction)
   - Both lips fold inward (down from top, up from bottom)
   - ox=sec_cx (right edge of web), oy=sec_cy (bottom of web)
── */
function cProfile(ox,oy,H,F,D,sc,stroke=1.8){
  const sH=H*sc, sF=F*sc, sD=D*sc;
  const R=Math.min(4*sc, sD*0.35, sF*0.15);
  const d=[
    // Top lip end → top flange → web top → web bottom → bottom flange → bottom lip end
    `M ${r(ox-sF+sD)}   ${r(oy-sH)}`,            // top lip tip (points right/inward)
    `L ${r(ox-sF+R)}    ${r(oy-sH)}`,             // top flange outer
    `Q ${r(ox-sF)} ${r(oy-sH)} ${r(ox-sF)} ${r(oy-sH+R)}`, // top-left corner
    `L ${r(ox-sF)}      ${r(oy-sH+sD)}`,          // top lip going down
    `M ${r(ox-sF)}      ${r(oy-sH)}`,             // reset to top flange-web join
    `L ${r(ox-R)}       ${r(oy-sH)}`,             // top flange toward web
    `Q ${r(ox)} ${r(oy-sH)} ${r(ox)} ${r(oy-sH+R)}`, // top-right web corner
    `L ${r(ox)}         ${r(oy-R)}`,              // web right edge
    `Q ${r(ox)} ${r(oy)} ${r(ox-R)} ${r(oy)}`,   // bottom-right web corner
    `L ${r(ox-sF+R)}    ${r(oy)}`,                // bottom flange
    `Q ${r(ox-sF)} ${r(oy)} ${r(ox-sF)} ${r(oy-R)}`, // bottom-left corner
    `L ${r(ox-sF)}      ${r(oy-sD)}`,             // bottom lip going up
    `M ${r(ox-sF+sD)}   ${r(oy)}`,                // bottom lip tip line
    `L ${r(ox-sF)}      ${r(oy)}`,                // complete bottom flange
  ].join(' ');
  return`<path d="${d}" stroke="${COUT}" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
}

function drawSection(sec_cx,sec_cy,H,B1,B2,D,sc,holes,label,scaleStr,isPrimary=true,isC=false,maxX=9999){
  let s='';
  const sH=H*sc, sB1=B1*sc, sB2=(isC?B1:B2)*sc, sD=D*sc;
  const t_px=Math.max(2.5*sc,3);

  // ── Profile ──
  s+=isC ? cProfile(sec_cx,sec_cy,H,B1,D,sc,1.6)
         : zProfile(sec_cx,sec_cy,H,B1,B2,D,sc,1.6);

  // ── Z-Z centerline (แนวตั้ง) ──
  const zzTop=sec_cy-sH-sD-20, zzBot=sec_cy+20;
  s+=SL(sec_cx,zzTop,sec_cx,zzBot,'#444',.5,'10,4,2,4');
  s+=ST(sec_cx,zzTop-8,'Z',8,'middle','#333','bold');
  s+=ST(sec_cx,zzBot+10,'Z',8,'middle','#333','bold');

  // ── Y-Y centerline (แนวนอน กึ่งกลาง web) ──
  const yyY=sec_cy-sH/2;
  const yyL=sec_cx-sB1-50, yyR=sec_cx+sB2+70;
  s+=SL(yyL,yyY,yyR,yyY,'#444',.5,'10,4,2,4');
  s+=ST(yyL-8,yyY,'Y',8,'middle','#333','bold');
  s+=ST(yyR+8,yyY,'Y',8,'middle','#333','bold');
  s+=ST(yyR+18,yyY+8,'Depth',6,'start','#666');

  // ── Dims — แสดงเฉพาะใน A-A (isPrimary) ──
  if(isPrimary){
    // B1 dim — เหนือ top flange
    s+=DH(sec_cx-sB1,sec_cx,sec_cy-sH-22,fmt(B1),CDIM,sec_cy-sH);
    s+=ST(sec_cx-sB1/2,sec_cy-sH-32,'Top Flange',6,'middle','#555');
    // B2 dim — ใต้ bot flange
    s+=DH(sec_cx,sec_cx+sB2,sec_cy+20,fmt(B2),CDIM,sec_cy);
    s+=ST(sec_cx+sB2/2,sec_cy+31,'Bottom Flange',6,'middle','#555');

    // H label บน Y-Y centerline ด้านซ้าย
    s+=ST(sec_cx-sB1-8,sec_cy-sH/2-5,`H=${fmt(H)}`,6.5,'end','#555','bold');

    // Lt / Lb — ด้านขวา
    const lipX=sec_cx+sB2+22;
    s+=DV(lipX,sec_cy-sH,sec_cy-sH+sD,`Lt=${fmt(D)}`,CDIM,null,6.5);
    s+=DV(lipX,sec_cy-sD,sec_cy,    `Lb=${fmt(D)}`,CDIM,null,6.5);
  }

  // ── WEB HOLES — แสดงเป็นสี่เหลี่ยมเล็กบนความหนาของ web ──
  // slot rectangle: กว้าง = WH, สูง = DH วางทับบนผิว web
  const webH=holes.filter(h=>!h.face||h.face==='WEB');
  const uniqueY=[...new Set(webH.map(h=>h.Y))].sort((a,b)=>a-b);

  // E = ระยะจาก top flange ถึง top hole, F = จาก bottom hole ถึง bottom flange
  const topHoles=webH.filter(h=>h.Y>H/2).sort((a,b)=>b.Y-a.Y);
  const botHoles=webH.filter(h=>h.Y<=H/2).sort((a,b)=>a.Y-b.Y);

  uniqueY.forEach((hy,i)=>{
    const hole=webH.find(h=>h.Y===hy);
    const screenY=sec_cy-hy*sc;
    const isTop=hy>H/2;
    const hs=holeStyle(hole?.holeType||'H1');

    // รูเจาะบนผิว web — แสดงเป็น ellipse สีตาม type (คล้ายจริง)
    const rH=Math.max(SLOT_DH*sc*0.45, 5);
    const rW=Math.max(SLOT_WH*sc*0.35, 8);
    if(hole?.slot!==false){
      // Slot: ellipse แนวนอน (ขนาน flange)
      s+=`<ellipse cx="${r(sec_cx)}" cy="${r(screenY)}" rx="${r(rW/2)}" ry="${r(rH/2)}" fill="${hs.fill}" stroke="${hs.stroke}" stroke-width="0.9"/>`;
    } else {
      // Circle hole (H3)
      s+=`<circle cx="${r(sec_cx)}" cy="${r(screenY)}" r="${r(rH/2)}" fill="${hs.fill}" stroke="${hs.stroke}" stroke-width="0.9"/>`;
    }
    // Center crosshair
    const CM=4;
    s+=SL(sec_cx-CM,screenY,sec_cx+CM,screenY,hs.stroke,.45,'2,1.5');
    s+=SL(sec_cx,screenY-CM,sec_cx,screenY+CM,hs.stroke,.45,'2,1.5');

    // Leader note ออกทางขวา
    const ang=isTop?-0.5:0.5;
    const ldX=sec_cx+Math.cos(ang)*28, ldY=screenY+Math.sin(ang)*28;
    const noteLbl=hole?.slot===false?`Ø${fmt(hole?.dia||18)}`:`${SLOT_DH}×${SLOT_WH} Slot`;
    s+=SL(sec_cx,screenY,ldX,ldY,hs.stroke,.45);
    s+=SL(ldX,ldY,ldX+32,ldY,hs.stroke,.45);
    s+=ST(ldX+34,ldY+3,noteLbl,7.5,'start',hs.stroke,'bold');
  });

  // ── Y CHAIN DIM (ซ้าย) — top → holes → bot ──
  if(uniqueY.length>0){
    const chainYphys=[H,...[...uniqueY].sort((a,b)=>b-a),0];
    // วาง chain ซ้ายของ B1 flange ทีละ lane (ห่างกัน 18px)
    const laneCount=chainYphys.length-1;
    const baseChainX=sec_cx-sB1-20;

    // Single chain lane (ทุก chain ใน X เดียวกัน)
    for(let i=0;i<chainYphys.length-1;i++){
      const sy1=sec_cy-chainYphys[i]*sc;
      const sy2=sec_cy-chainYphys[i+1]*sc;
      const gap=chainYphys[i]-chainYphys[i+1];
      s+=DV(baseChainX,sy1,sy2,fmt(gap),CDIM,sec_cx-sB1,6.5);
    }
    // Overall H dim อีก lane ถัดออก
    if(laneCount>2){
      s+=DV(baseChainX-20,sec_cy-sH,sec_cy,`H=${fmt(H)}`,CDIM,sec_cx-sB1,7);
    }

    // GL dim ระหว่าง H1 pair (ถ้ามี 2 Y) — วางขวา web
    const h1Ys=webH.filter(h=>h.holeType==='H1').map(h=>h.Y);
    if(h1Ys.length===2){
      const glScreenY1=sec_cy-Math.min(...h1Ys)*sc;
      const glScreenY2=sec_cy-Math.max(...h1Ys)*sc;
      const gl=Math.abs(h1Ys[0]-h1Ys[1]);
      const glX=sec_cx+t_px+10;
      s+=DV(glX,glScreenY2,glScreenY1,`GL=${fmt(gl)}`,CDIM,null,6.5);
    }
  }

  // ── FLANGE HOLES (TOP/BOT) ── ellipse สีตาม H2 style
  const h2hs_sec=holeStyle('H2');
  holes.filter(h=>h.face==='TOP').forEach(hole=>{
    const hx=sec_cx-sB1/2, hy=sec_cy-sH;
    const fw=Math.max(SLOT_WH*sc*0.35,8), fh=Math.max(SLOT_DH*sc*0.35,5);
    s+=`<ellipse cx="${r(hx)}" cy="${r(hy)}" rx="${r(fw/2)}" ry="${r(fh/2)}" fill="${h2hs_sec.fill}" stroke="${h2hs_sec.stroke}" stroke-width="0.9"/>`;
    const ldLen=Math.max(sB1*0.6, 28);
    s+=SL(hx,hy-fh/2-3,hx,hy-fh/2-14,h2hs_sec.stroke,.45);
    s+=SL(hx,hy-fh/2-14,hx-ldLen,hy-fh/2-14,h2hs_sec.stroke,.45);
    s+=ST(hx-ldLen-2,hy-fh/2-11,`${SLOT_DH}×${SLOT_WH} Slot`,7.5,'end',h2hs_sec.stroke,'bold');
  });
  holes.filter(h=>h.face==='BOT').forEach(hole=>{
    const hx=isC ? sec_cx-sB2/2 : sec_cx+sB2/2;
    const hy=sec_cy;
    const fw=Math.max(SLOT_WH*sc*0.35,8), fh=Math.max(SLOT_DH*sc*0.35,5);
    s+=`<ellipse cx="${r(hx)}" cy="${r(hy)}" rx="${r(fw/2)}" ry="${r(fh/2)}" fill="${h2hs_sec.fill}" stroke="${h2hs_sec.stroke}" stroke-width="0.9"/>`;
    if(isC){
      const ldLen=Math.max(sB2*0.6, 28);
      s+=SL(hx,hy+fh/2+3,hx,hy+fh/2+14,h2hs_sec.stroke,.45);
      s+=SL(hx,hy+fh/2+14,hx-ldLen,hy+fh/2+14,h2hs_sec.stroke,.45);
      s+=ST(hx-ldLen-2,hy+fh/2+17,`${SLOT_DH}×${SLOT_WH} Slot`,7.5,'end',h2hs_sec.stroke,'bold');
    } else {
      // Z purlin BOT: ฉากขวา — clamp ปลาย leader ไม่เกิน maxX
      const lblW=65; // ความกว้างโดยประมาณของ "18×22 Slot"
      const ldMax=Math.max(maxX-hx-lblW-4, 4); // เว้น lblW ก่อนถึง maxX
      const ldLen=Math.min(Math.max(sB2*0.5, 16), ldMax);
      const lineY=hy+fh/2+14;
      s+=SL(hx,hy+fh/2+3,hx,lineY,h2hs_sec.stroke,.45);
      s+=SL(hx,lineY,hx+ldLen,lineY,h2hs_sec.stroke,.45);
      s+=ST(hx+ldLen+2,lineY+3,`${SLOT_DH}×${SLOT_WH} Slot`,7.5,'start',h2hs_sec.stroke,'bold');
    }
  });

  // Label
  // Z: center = sec_cx + (sB2-sB1)/2  (shift right because B2 is wider/right)
  // C: center = sec_cx - sB1/2        (both flanges left, center on flange)
  const lx=isC ? sec_cx-sB1/2 : sec_cx+(sB2-sB1)/2;
  s+=ST(lx,sec_cy+52,'SECTION  '+label,8,'middle','#000','bold');
  s+=ST(lx,sec_cy+63,'SCALE  '+scaleStr,7,'middle','#666');
  return s;
}

/* ── TITLE BLOCK ── */
function drawTitleBlock(tb,purlinLabel,tbY,sheetNum=1,totalSheets=1){
  const TX=9, TY=tbY, TW=SW-18, TH=SH-tbY-9;

  let s=SR(TX,TY,TW,TH,'#444',1,'#fff');

  // ── LEFT: Company block ──
  const CW=190;
  s+=SR(TX,TY,CW,TH,'#666',.5,'#f5f3ea');
  s+=SL(TX+12,TY+TH*0.38,TX+CW-12,TY+TH*0.38,'#ccc',.4);
  s+=SL(TX+CW,TY,TX+CW,TY+TH,'#666',.6);
  s+=ST(TX+CW/2,TY+TH*0.22,'TMT STEEL',11,'middle','#000','bold');
  s+=ST(TX+CW/2,TY+TH*0.37,'PUBLIC COMPANY LIMITED',6.5,'middle','#555');
  s+=ST(TX+CW/2,TY+TH*0.55,'HOLE DRILLING SHOP DRAWING',6.5,'middle','#777');
  s+=ST(TX+CW/2,TY+TH*0.78,purlinLabel,6.5,'middle','#000','bold');

  // ── MIDDLE: Project / Note / Approval boxes ──
  const RW=210;
  const MW=TW-CW-RW;
  const MX=TX+CW;
  s+=SL(MX+MW,TY,MX+MW,TY+TH,'#666',.6);

  // Split middle: top 35% = project+note, bottom 65% = 3 approval boxes
  const mSplit=TH*0.38;
  s+=SL(MX,TY+mSplit,MX+MW,TY+mSplit,'#ddd',.4);

  // Project
  s+=ST(MX+8,TY+mSplit*0.28,'PROJECT:',6.5,'start','#999');
  s+=ST(MX+62,TY+mSplit*0.28,tb.proj,9,'start','#000','bold');
  // Note
  s+=ST(MX+8,TY+mSplit*0.65,'NOTE:',6.5,'start','#999');
  s+=ST(MX+46,TY+mSplit*0.65,tb.note,7.5,'start','#333');
  s+=ST(MX+8,TY+mSplit*0.88,'ALL DIMENSIONS IN mm / SCALE MAY DIFFER',5.5,'start','#aaa');

  // 3 Approval boxes (equal width)
  const apvW=Math.floor(MW/3);
  const apvY=TY+mSplit+1;
  const apvH=TH-mSplit-2;
  const apvDefs=[
    {lbl:'DRAWN BY',         val:tb.by||'—'},
    {lbl:'TMT APPROVE',      val:''},
    {lbl:'CUSTOMER APPROVE', val:''},
  ];
  apvDefs.forEach((ap,i)=>{
    const ax=MX+i*apvW;
    if(i>0) s+=SL(ax,apvY,ax,apvY+apvH,'#ccc',.4);
    s+=ST(ax+apvW/2,apvY+apvH*0.22,ap.lbl,5.5,'middle','#888','bold');
    s+=SL(ax+8,apvY+apvH*0.72,ax+apvW-8,apvY+apvH*0.72,'#ccc',.5);
    if(ap.val) s+=ST(ax+apvW/2,apvY+apvH*0.62,ap.val,9,'middle','#000','bold');
  });

  // ── 3rd Angle Projection symbol — วางหลัง RX ถูก declare ──

  // ── RIGHT: Drawing info ──
  const RX=TX+TW-RW;
  s+=SR(RX,TY,RW,TH,'#666',.5,'#f5f3ea');
  const R1=TH*0.44, R2=TH*0.76;
  s+=SL(RX,TY+R1,RX+RW,TY+R1,'#ccc',.4);
  s+=SL(RX,TY+R2,RX+RW,TY+R2,'#ccc',.4);
  s+=SL(RX+RW/2,TY+R1,RX+RW/2,TY+TH,'#ccc',.4);

  // 3rd Angle Projection symbol — กลางขวาของ DRAWING NO. block
  {
    const R=7.5;
    // วางกึ่งกลางแนวตั้งของ R1 block, ชิดขวา
    const cx2=RX+RW-R-6;           // circles: ชิดขวา pad 6px
    const cx1=cx2-R*3.6;           // frustum center
    const cy=TY+R1/2;              // กึ่งกลางแนวตั้ง R1 block

    // Double concentric circles
    s+=`<circle cx="${r(cx2)}" cy="${r(cy)}" r="${r(R)}" stroke="#666" stroke-width="0.6" fill="none"/>`;
    s+=`<circle cx="${r(cx2)}" cy="${r(cy)}" r="${r(R*0.46)}" stroke="#666" stroke-width="0.6" fill="none"/>`;
    const ch=R*1.4;
    s+=SL(cx2-ch,cy,cx2+ch,cy,'#888',.35,'4,2.5');
    s+=SL(cx2,cy-ch,cx2,cy+ch,'#888',.35,'4,2.5');

    // Frustum
    const fw=R*1.25, fhL=R*0.88, fhR=R*0.5;
    s+=`<path d="M${r(cx1-fw)},${r(cy-fhL)} L${r(cx1+fw)},${r(cy-fhR)} L${r(cx1+fw)},${r(cy+fhR)} L${r(cx1-fw)},${r(cy+fhL)} Z"
      stroke="#666" stroke-width="0.6" fill="none"/>`;
    s+=SL(cx1+fw,cy, cx2-ch,cy, '#888',.35,'4,2.5');
    s+=ST((cx1+cx2)/2+R*0.3, cy+R+5, '3rd Angle',4,'middle','#aaa');
  }

  s+=ST(RX+RW/2,TY+R1*0.28,'DRAWING NO.',6.5,'middle','#888');
  s+=ST(RX+RW/2,TY+R1*0.75,tb.no,13,'middle','#000','bold');

  s+=ST(RX+RW/4,TY+R1+(R2-R1)*0.25,'QTY (PCS)',6,'middle','#888');
  s+=ST(RX+RW/4,TY+R1+(R2-R1)*0.68,`${tb.qty} pcs`,9,'middle','#111','bold');  s+=ST(RX+RW*3/4,TY+R1+(R2-R1)*0.25,'DATE',6,'middle','#888');
  s+=ST(RX+RW*3/4,TY+R1+(R2-R1)*0.68,tb.date||today(),8,'middle','#111');

  s+=ST(RX+RW/4,TY+R2+(TH-R2)*0.22,'REV.',6,'middle','#888');
  s+=ST(RX+RW/4,TY+R2+(TH-R2)*0.72,tb.rev,15,'middle','#000','bold');
  s+=ST(RX+RW*3/4,TY+R2+(TH-R2)*0.22,'SHEET',6,'middle','#888');
  s+=ST(RX+RW*3/4,TY+R2+(TH-R2)*0.72,`${sheetNum} / ${totalSheets}`,9,'middle','#000');

  return s;
}

/* ── HOLE TABLE UI ── */
let _hcnt=0;

function getAutoY(holeType, face){
  const H=+document.getElementById('pH').value||152;
  if(face==='WEB') return lookupY(holeType,H);
  return ''; // flange holes: Y not applicable
}

function addHole(qty=1,face='WEB',X='',holeType='H1',yOverride=null){
  _hcnt++;
  const id='h'+_hcnt;
  const tr=document.createElement('tr');
  tr.id=id; tr.className='face-'+face;

  const typeOptions=(f)=>({WEB:['H1','H2','H3'],TOP:['TOP'],BOT:['BOT']}[f]||['H1']);
  const faceOpts=['WEB','TOP','BOT'].map(f=>`<option${face===f?' selected':''}>${f}</option>`).join('');
  const typeOpts=typeOptions(face).map(t=>`<option${holeType===t?' selected':''}>${t}</option>`).join('');

  const _H=+document.getElementById('pH').value||152;
  const _row=getTMTRow(_H);
  const autoYDisplay=holeType==='H1'?`${fmt(_H/2-_row.GL/2)}/${fmt(_H/2+_row.GL/2)}`
                    :holeType==='H2'?'B1+B2'
                    :holeType==='H3'?`${Math.round(_H/2)}`:'auto';

  // ช่อง Y: WEB types กรอกได้, flange types (H2/TOP/BOT) แสดงค่าคงที่
  const isFlange=(holeType==='H2'||face==='TOP'||face==='BOT');
  const yVal=yOverride!==null?yOverride:'';

  tr.innerHTML=`
    <td><input type="number" value="${qty}" min="1" max="50" style="width:100%;text-align:center"></td>
    <td><select class="face-sel" onchange="onFaceChange(this)">${faceOpts}</select></td>
    <td><input class="x-inp" type="number" value="${X}" placeholder="X" min="0" step="1"
      oninput="calcSP(this)" style="width:100%"></td>
    <td><input class="sp-inp" type="number" placeholder="SP" min="0" step="1"
      oninput="calcX(this)" style="width:100%;color:#58a6ff"></td>
    <td><select class="type-sel" onchange="onTypeChange(this)">${typeOpts}</select></td>
    <td><input class="y-inp" type="text" value="${yVal}"
      placeholder="${autoYDisplay}"
      ${isFlange?'readonly tabindex="-1"':''}
      style="width:100%;font-size:8px;text-align:center;
        ${isFlange?'color:#555;cursor:default;':'color:#f0d080;'}
        background:transparent;border:none;padding:2px"
      oninput="if(_g0){clearTimeout(_deb);_deb=setTimeout(generate,700)}"></td>
    <td class="dia-cell" style="font-size:8px;text-align:center;padding:2px;color:#888">${lookupDia(holeType)}</td>
    <td><button class="dbtn" onclick="document.getElementById('${id}').remove();recalcAllSP()">✕</button></td>`;
  document.getElementById('htbody').appendChild(tr);
  recalcAllSP(); // อัปเดต SP ของทุกแถวหลังเพิ่ม
}

/* ── SP ↔ X two-way calculation ── */
function getPrevX(tr){
  // หา X ของแถวก่อนหน้า
  const rows=Array.from(document.getElementById('htbody').querySelectorAll('tr'));
  const idx=rows.indexOf(tr);
  if(idx<=0) return 0;
  return parseFloat(rows[idx-1].querySelector('.x-inp').value)||0;
}

function calcSP(xInp){
  // user พิมพ์ X → คำนวณ SP
  const tr=xInp.closest('tr');
  const xVal=parseFloat(xInp.value);
  const prevX=getPrevX(tr);
  const spInp=tr.querySelector('.sp-inp');
  if(!isNaN(xVal)){
    spInp.value=Math.round(xVal-prevX);
  } else {
    spInp.value='';
  }
  // อัปเดต SP ของแถวถัดไปด้วย
  recalcAllSP();
  if(_g0){ clearTimeout(_deb); _deb=setTimeout(generate,700); }
}

function calcX(spInp){
  // user พิมพ์ SP → คำนวณ X
  const tr=spInp.closest('tr');
  const spVal=parseFloat(spInp.value);
  const prevX=getPrevX(tr);
  const xInp=tr.querySelector('.x-inp');
  if(!isNaN(spVal)){
    xInp.value=Math.round(prevX+spVal);
  } else {
    xInp.value='';
  }
  recalcAllSP();
  if(_g0){ clearTimeout(_deb); _deb=setTimeout(generate,700); }
}

function recalcAllSP(){
  // อัปเดต SP ทุกแถว จาก X ปัจจุบัน (ไม่รบกวนถ้า user กำลังพิมพ์)
  const rows=Array.from(document.getElementById('htbody').querySelectorAll('tr'));
  rows.forEach((tr,i)=>{
    const xInp=tr.querySelector('.x-inp');
    const spInp=tr.querySelector('.sp-inp');
    if(!xInp||!spInp) return;
    if(document.activeElement===spInp) return; // user กำลังพิมพ์ SP อยู่ → ข้าม
    const xVal=parseFloat(xInp.value);
    const prevX=i===0?0:(parseFloat(rows[i-1].querySelector('.x-inp').value)||0);
    if(!isNaN(xVal)) spInp.value=Math.round(xVal-prevX);
    else spInp.value='';
  });
}

function onFaceChange(sel){
  const tr=sel.closest('tr');
  tr.className='face-'+sel.value;
  const typeSel=tr.querySelector('.type-sel');
  const opts={WEB:['H1','H2','H3'],TOP:['TOP'],BOT:['BOT']}[sel.value]||['H1'];
  typeSel.innerHTML=opts.map(t=>`<option>${t}</option>`).join('');
  onTypeChange(typeSel);
}
function onTypeChange(sel){
  const tr=sel.closest('tr');
  const H=+document.getElementById('pH').value||152;
  const row=getTMTRow(H);
  tr.querySelector('.dia-cell').textContent=lookupDia(sel.value);
  const yInp=tr.querySelector('.y-inp');
  if(yInp){
    const isFlange=(sel.value==='H2'||sel.value==='TOP'||sel.value==='BOT');
    let autoY='auto';
    if(sel.value==='H1')      autoY=`${fmt(H/2-row.GL/2)}/${fmt(H/2+row.GL/2)}`;
    else if(sel.value==='H2') autoY='B1+B2';
    else if(sel.value==='H3') autoY=`${Math.round(H/2)}`;
    yInp.placeholder=autoY;
    yInp.readOnly=isFlange;
    yInp.style.cursor=isFlange?'default':'text';
    yInp.style.color=isFlange?'#555':'#f0d080';
    if(isFlange) yInp.value=''; // reset เมื่อเปลี่ยนเป็น flange type
  }
}

/* ── VALIDATION ── */
function validate(L,H,B1,B2,D,t,holes){
  const e=[];
  if(!L||L<100) e.push('L < 100');
  if(!H||H<30)  e.push('H < 30');
  if(B1<10||B2<10) e.push('B1/B2 < 10');
  if(t<0.5) e.push('t < 0.5');
  holes.forEach((h,i)=>{
    const n=i+1;
    if(h.X<0||h.X>L) e.push(`รูที่${n}: X นอกช่วง`);
    if(h.face==='WEB'&&(h.Y<0||h.Y>H)) e.push(`รูที่${n}: Y นอก Web`);
  });
  return e;
}
function showVal(e){
  const el=document.getElementById('val-msg');
  if(!e.length){el.style.display='none';return;}
  el.style.display='block'; el.innerHTML='⚠ '+e.join('<br>⚠ ');
}

/* ── GET HOLES — expand Type into actual hole definitions ── */
function getHoles(){
  const H=+document.getElementById('pH').value;
  const result=[];
  Array.from(document.getElementById('htbody').querySelectorAll('tr')).forEach(tr=>{
    // ใช้ class selector แทน index เพื่อ robust กับการเพิ่มช่องใหม่
    const qty  = parseInt(tr.querySelector('input[type=number]')?.value)||1;
    const face = tr.querySelector('.face-sel')?.value||'WEB';
    const X    = parseFloat(tr.querySelector('.x-inp')?.value)||0;
    const holeType = tr.querySelector('.type-sel')?.value||'H1';
    const yRaw = tr.querySelector('.y-inp')?.value.trim()||'';

    if(holeType==='H1'){
      // ถ้า user กรอก Y เอง: รองรับรูปแบบ "Y1/Y2" หรือ "Y1" (single)
      let subs;
      if(yRaw && yRaw!==''){
        const parts=yRaw.split('/').map(v=>parseFloat(v.trim())).filter(v=>!isNaN(v));
        subs=parts.length>=2
          ? [{Y:parts[0]},{Y:parts[1]}]
          : parts.length===1 ? [{Y:parts[0]}] : h1Holes(H);
      } else {
        subs=h1Holes(H); // ใช้ค่า GL จาก catalog
      }
      subs.forEach(sub=>{
        result.push({qty,face:'WEB',X,Y:sub.Y,dia:SLOT_DH,slot:true,slotW:SLOT_WH,
          holeType:'H1',glSpan:sub.glSpan||null,_xPos:[X]});
      });
    } else if(holeType==='H2'){
      result.push({qty,face:'TOP',X,Y:0,dia:SLOT_DH,slot:true,slotW:SLOT_WH,holeType:'H2',_xPos:[X]});
      result.push({qty,face:'BOT',X,Y:0,dia:SLOT_DH,slot:true,slotW:SLOT_WH,holeType:'H2',_xPos:[X]});
    } else if(holeType==='H3'){
      const Yval = yRaw ? parseFloat(yRaw)||Math.round(H/2) : Math.round(H/2);
      result.push({qty,face:'WEB',X,Y:Yval,dia:18,slot:false,holeType:'H3',_xPos:[X]});
    } else {
      result.push({qty,face,X,Y:0,dia:SLOT_DH,slot:true,slotW:SLOT_WH,holeType,_xPos:[X]});
    }
  });
  return result;
}

function expandHoles(holes){
  return holes.map(h=>({...h,_xPos:[h.X]}));
}

/* ════════════════════════════════════════════
   MAIN GENERATE
════════════════════════════════════════════ */
function generate(){
  const L=+document.getElementById('pL').value;
  const H=+document.getElementById('pH').value;
  const B1=+document.getElementById('pB1').value;
  const B2=+document.getElementById('pB2').value;
  const D=+document.getElementById('pD').value;
  const t=+document.getElementById('pt').value;
  // ต้อง declare ก่อน validate (ใช้ใน TDZ ถ้าไว้ทีหลัง)
  const isC=_purlType==='C';
  const B2eff=isC?B1:B2;
  if(isC) document.getElementById('pB2').value=B1;

  const holes=getHoles();
  const errs=validate(L,H,B1,B2eff,D,t,holes);
  showVal(errs); if(errs.length) return;
  _cboxes=[];

  const tb={
    proj:document.getElementById('tbProj').value,
    no:document.getElementById('tbNo').value,
    rev:document.getElementById('tbRev').value,
    by:document.getElementById('tbBy').value,
    qty:document.getElementById('tbQty').value||'1',
    date:document.getElementById('tbDate').value,
    note:document.getElementById('tbNote').value
  };
  const b2part=isC?'':`×${B2eff}`;
  const purlinLabel=`${_purlType}-${H}×${B1}${b2part}×${D}×${t}  /  L = ${fmt(L)} mm`;

  /* ══════════════════════════════════════════
     LAYOUT — A3 Landscape (1190×841)
     ┌─────────────────────────────────────────┐ MT
     │  WEB VIEW  (elevation, full width)      │ ~35% height
     ├─────────────────────────────────────────┤ tvY (top view divider)
     │  TOP VIEW  (plan view, full width)      │ ~15% height
     ├──────────────────────┬──────────────────┤ divY
     │  SECTION A  SECT. B  │  HOLE SCHEDULE   │ ~38%
     ├──────────────────────┴──────────────────┤ TB_Y
     │  TITLE BLOCK                            │ ~12%
     └─────────────────────────────────────────┘
  ══════════════════════════════════════════ */
  const ML=58, MR=22, MT=28, MB=95;
  const TB_Y=SH-MB;
  const CONTENT_H=TB_Y-MT;

  // Web View zone — 30% ให้ Top View ขึ้นสูง
  const WEB_H=Math.round(CONTENT_H*0.30);
  const tvY=MT+WEB_H;

  // Top View zone — 14% พอใส่ chain dim ด้านบน + profile + callout ด้านล่าง
  const TV_H=Math.round(CONTENT_H*0.14);
  const divY=tvY+TV_H;

  // Section+Schedule zone (remaining)
  const SEC_ZONE_H=TB_Y-divY;

  // ── WEB VIEW LAYOUT ── DPT ใหญ่ขึ้นเพื่อ chain dim + callouts บนหัว
  const DPL=58, DPR=22, DPT=56, DPB=42;
  const eW=(SW-ML-MR)-DPL-DPR;
  const scX=Math.min(eW/L, 2.2);
  const webPxW=L*scX;
  const webInner=WEB_H-DPT-DPB;
  const webPxH=Math.max(Math.min(H*scX, webInner*0.52), 48);
  const scY=webPxH/H;
  const WX=ML+DPL+(eW-webPxW)/2;
  const WY=MT+DPT+(webInner-webPxH)/2;
  // Pre-register SVG outer margin so pills stay inside drawing
  _cboxes.push([0, WX-4, 0, SH]);           // left outer margin
  _cboxes.push([WX+webPxW+4, SW, 0, SH]);   // right outer margin

  // ── TOP VIEW LAYOUT (plan: shows flange width as rectangles) ──
  const TV_PAD_T=38, TV_PAD_B=10;
  const tvInner=TV_H-TV_PAD_T-TV_PAD_B;
  const tvScale=Math.min(tvInner/(B1+B2eff), scX);
  const tvWebH=(B1+B2eff)*tvScale;
  const tvWY=tvY+TV_PAD_T+(tvInner-tvWebH)/2;

  const SXr=r(L/webPxW,2), SYr=r(H/webPxH,2);
  const distorted=Math.abs(SXr-SYr)>0.06;
  document.getElementById('slbl').textContent=
    distorted?`X 1:${SXr}  Y 1:${SYr}`:`Scale 1:${SXr}`;

  const wHoles=holes.filter(h=>h.face==='WEB');
  const tHoles=holes.filter(h=>h.face==='TOP');
  const bHoles=holes.filter(h=>h.face==='BOT');
  const expanded=expandHoles(holes);
  const hasSecB=(tHoles.length>0||bHoles.length>0);

  // Section layout
  const SEC_ZONE_W=Math.round((SW-ML-MR)*0.52);
  const SCH_X=ML+SEC_ZONE_W+10;
  const SCH_W=SW-MR-SCH_X-4;
  const numSec=1+(hasSecB?1:0);
  const secSlot=Math.floor((SEC_ZONE_W-40)/numSec);
  const secAvailH=SEC_ZONE_H-70;
  const secSc=Math.min(secAvailH/H, (secSlot-80)/(B1+B2eff+D*2+10));
  const secH_px=H*secSc;
  const uniqueHY_all=[...new Set(wHoles.map(h=>h.Y))].sort((a,b)=>a-b);
  const yDimSpace=(uniqueHY_all.length+1)*22+24;
  const secAx=ML+yDimSpace+B1*secSc+10;
  const secAy=divY+16+Math.round((SEC_ZONE_H-secH_px-70)/2)+secH_px;
  const secBx=secAx+(B1+B2eff)*secSc+secSlot*0.52;
  const secBy=secAy;

  /* ══ SVG BUILD ══ */
  let s='';
  s+=`<rect width="${SW}" height="${SH}" fill="#fff"/>`;
  s+=SR(6,6,SW-12,SH-12,'#333',1);
  s+=SR(9,9,SW-18,SH-18,'#aaa',.3);

  // Zone dividers
  s+=SL(ML,tvY, SW-MR,tvY, '#bbb',.5,'5,3');           // web / top view
  s+=SL(ML,divY,SW-MR,divY,'#bbb',.5,'5,3');            // top view / section
  s+=SL(SCH_X-5,divY,SCH_X-5,TB_Y,'#bbb',.5,'5,3');    // section / schedule

  // Block zone divider strips — ป้องกัน callout ข้าม zone
  _cboxes.push([WX-100, WX+webPxW+100, tvY-6, tvY+6]);
  _cboxes.push([WX-100, WX+webPxW+100, divY-6, divY+6]);
  // Block HOLE SCHEDULE area — callout ไม่วางซ้อน schedule
  _cboxes.push([SCH_X-8, SW-MR, divY, TB_Y]);

  // Zone labels (left margin) — ใช้ 2 ST แทน \n
  const wvMidY=(MT+tvY)/2;
  s+=ST(ML-10, wvMidY-5,   'WEB', 6.5,'middle','#aaa','normal',`rotate(-90,${ML-10},${wvMidY})`);
  s+=ST(ML-10, tvY-5+(tvY-MT)*0.15, 'VIEW', 6.5,'middle','#aaa','normal',`rotate(-90,${ML-10},${wvMidY})`);
  const tvMidY=(tvY+divY)/2;
  s+=ST(ML-10, tvMidY-4, 'TOP VIEW', 6.5,'middle','#aaa','normal',`rotate(-90,${ML-10},${tvMidY})`);

  /* ════════════════════════════════════════
     WEB VIEW — dimension ของ WEB face เท่านั้น
     - Chain dim: X positions ของ WEB holes
     - Y dim (ซ้าย): ระยะ Y ของ WEB holes
     - H dim (ซ้าย): ความสูง web
     - L dim (ล่าง): ความยาวทั้งหมด
     - Cut line A-A: ณ ตำแหน่ง WEB holes
     - ไม่แสดง callout/dim ของ TOP/BOT ใน view นี้
  ════════════════════════════════════════ */
  s+=ST(WX+webPxW/2, MT+11, 'WEB VIEW (ELEVATION)',9,'middle','#000','bold');
  s+=ST(WX+webPxW/2, MT+21, purlinLabel,7.5,'middle','#555');

  /* ── HOLE TYPE LEGEND — จะวางหลัง schedule (เพื่อคำนวณตำแหน่ง schedBottom) ── */
  if(distorted) s+=ST(WX+webPxW/2,MT+30,'(DIAGRAMMATIC)',6.5,'middle','#c00');

  // Centerline
  s+=SL(WX-15,WY+webPxH/2,WX+webPxW+15,WY+webPxH/2,CDIM,.4,'10,5');

  // Pre-register web outline strips so callouts won't overlap the drawing body
  // Top flange strip
  _cboxes.push([WX, WX+webPxW, WY-5, WY+5]);
  // Bottom flange strip
  _cboxes.push([WX, WX+webPxW, WY+webPxH-5, WY+webPxH+5]);

  // Web outline (rectangle = web face)
  s+=SR(WX,WY,webPxW,webPxH,COUT,.8);
  s+=SL(WX,WY,WX+webPxW,WY,COUT,3);                    // top flange (B1) outer edge — เส้นทึบ
  s+=SL(WX,WY+webPxH,WX+webPxW,WY+webPxH,COUT,3);     // bot flange (B2) outer edge — เส้นทึบ
  s+=SL(WX,WY-7,WX,WY+webPxH+7,COUT,.9);               // left end
  s+=SL(WX+webPxW,WY-7,WX+webPxW,WY+webPxH+7,COUT,.9); // right end

  /* ── LIP LINES IN ELEVATION ──
     Z-purlin: มองจากด้าน web
     B1 (top flange): lip พับลงเข้าหา web
       → เห็นขอบ lip จากด้านหน้า = เส้นทึบ
       → อยู่ที่ Y = WY + D*scY (ต่ำกว่า top edge)
     B2 (bot flange): lip พับขึ้นเข้าหา web
       → ซ่อนอยู่ด้านหลัง web = เส้นประ
       → อยู่ที่ Y = WY + webPxH - D*scY (สูงกว่า bot edge)
  */
  const lipPx=D*scY;

  if(isC){
    // C purlin: both lips visible (both fold inward)
    s+=SL(WX,WY+lipPx,WX+webPxW,WY+lipPx,COUT,1.2);         // top lip (solid)
    s+=SL(WX,WY+webPxH-lipPx,WX+webPxW,WY+webPxH-lipPx,COUT,1.2); // bot lip (solid)
    s+=ST(WX-4,WY+2,'← B',6,'end','#888');
    s+=ST(WX-4,WY+lipPx+1,'← D',6,'end','#999');
  } else {
    // Z purlin: B1 lip visible, B2 lip hidden
    s+=SL(WX,WY+lipPx,WX+webPxW,WY+lipPx,COUT,1.2);
    s+=SL(WX,WY+webPxH-lipPx,WX+webPxW,WY+webPxH-lipPx,COUT,1.0,'5,3');
    s+=ST(WX-4,WY+2,'← B1',6,'end','#888');
    s+=ST(WX-4,WY+lipPx+1,'← D (lip)',6,'end','#999');
    s+=ST(WX-4,WY+webPxH+9,'← B2',6,'end','#888');
  }

  /* Y dims LEFT (WEB holes เท่านั้น) */
  const uniqueHY=[...new Set(wHoles.map(h=>h.Y))].sort((a,b)=>a-b);
  const hDimElvX=WX-20-(uniqueHY.length)*18-16;

  // Pre-register LEFT dim zone so callouts won't overlap
  // บล็อคพื้นที่ซ้ายตั้งแต่ hDimElvX ถึง WX ตลอดความสูง web
  _cboxes.push([hDimElvX-8, WX-2, WY-4, WY+webPxH+4]);

  uniqueHY.forEach((hy,i)=>{
    const screenY=WY+(H-hy)*scY;
    const dimX=WX-20-i*18;
    s+=DV(dimX, WY, screenY, fmt(H-hy), CDIM, WX, 7);
    if(i===uniqueHY.length-1)
      s+=DV(dimX-18, screenY, WY+webPxH, fmt(hy), CDIM, WX, 7);
  });

  /* H dim LEFT */
  s+=DV(hDimElvX, WY, WY+webPxH, `H = ${fmt(H)}`, CDIM, WX, 8);

  // Pre-register CHAIN DIM zone (บนหัว web view) — 2 lanes สูง
  _cboxes.push([WX-4, WX+webPxW+4, WY-DPT+4, WY-4]);

  // Pre-register L DIM zone (ใต้ web view)
  _cboxes.push([WX-4, WX+webPxW+4, WY+webPxH+2, WY+webPxH+DPB]);

  /* Cut lines A-A — span ทั้ง web view + top view */
  function cutLine(hx, lbl, arrowRight=true, spanToTV=false){
    let cs='';
    const cy1=WY-DPT+14;
    const cy2=spanToTV ? tvY+TV_H-4 : WY+webPxH+7;
    cs+=SL(hx,cy1,hx,cy2,'#333',.65,'8,3,2,3');
    // Arrow showing view direction
    const ax=arrowRight?hx+10:hx-10;
    cs+=`<polygon points="${r(ax)},${r(cy2)} ${r(hx+(arrowRight?3:-3))},${r(cy2-5)} ${r(hx+(arrowRight?3:-3))},${r(cy2+5)}" fill="#333" stroke="none"/>`;
    // Circle labels at top and bottom
    const mkCircle=(cx,cy)=>{
      cs+=SC(cx,cy,7,'#333',.75,'white');
      cs+=ST(cx,cy+3.5,lbl,7.5,'middle','#000','bold');
    };
    mkCircle(hx,cy1-9);
    mkCircle(hx,cy2+9);
    return cs;
  }

  /* WEB holes + A-A cut lines */
  const webCutXs=[...new Set(wHoles.map(h=>h.X))].sort((a,b)=>a-b);

  // Register collision boxes for holes
  expanded.filter(h=>h.face==='WEB').forEach(hole=>{
    const hy=WY+(H-hole.Y)*scY;
    hole._xPos.forEach(xPos=>{ blockCircle(WX+xPos*scX,hy,8); });
  });

  // PRE-REGISTER cut circles — เฉพาะด้านขวา (rightmost X เท่านั้น)
  if(webCutXs.length>0){
    const lastWebX=webCutXs[webCutXs.length-1];
    const cy1=WY-DPT+14-9, cy2=(WY+webPxH+7)+9;
    blockCircle(WX+lastWebX*scX, cy1, 9);
    blockCircle(WX+lastWebX*scX, cy2, 9);
  }

  /* Helper: draw a slot (oval) on SVG
     cx,cy = centre, slotH = short axis px, slotW = long axis px, vertical=true → tall oval */
  function drawSlot(cx,cy,slotHpx,slotWpx,vertical=true,stroke=COUT,fill='white'){
    const rx=vertical?slotHpx/2:slotWpx/2;
    const ry=vertical?slotWpx/2:slotHpx/2;
    return`<ellipse cx="${r(cx)}" cy="${r(cy)}" rx="${r(rx,2)}" ry="${r(ry,2)}" stroke="${stroke}" stroke-width="0.9" fill="${fill}"/>`;
  }

  // Collect web holes per X position (group H1 pairs together for GL dim)
  const webHolesByY={};
  expanded.filter(h=>h.face==='WEB').forEach(hole=>{
    const hy=WY+(H-hole.Y)*scY;
    const hx=WX+hole.X*scX;
    const hs=holeStyle(hole.holeType);
    const CROSS=7;
    // Crosshair ใช้สีของ type
    s+=SL(hx-CROSS,hy,hx+CROSS,hy,hs.stroke,.45,'4,2');
    s+=SL(hx,hy-CROSS,hx,hy+CROSS,hs.stroke,.45,'4,2');
    // Shape ใส่สีตาม type
    if(hole.slot){
      const slotHpx=Math.max(hole.dia*scY*0.5,5);
      const slotWpx=Math.max((hole.slotW||SLOT_WH)*scY*0.5,8);
      s+=drawSlot(hx,hy,slotHpx,slotWpx,false,hs.stroke,hs.fill);
    } else {
      s+=SC(hx,hy,Math.max(hole.dia/2*scY,3.5),hs.stroke,.9,hs.fill);
    }
    // Collect for Y-grouping (ยังเก็บไว้สำหรับ GL dim)
    const yKey=Math.round(hy);
    if(!webHolesByY[yKey]) webHolesByY[yKey]=[];
    const lbl=hole.slot?`${hole.qty}-(${SLOT_DH}×${SLOT_WH}) Slot.`:`${hole.qty}-Ø${fmt(hole.dia)} Hole.`;
    webHolesByY[yKey].push({hx,hy,qty:hole.qty,dia:hole.dia,slot:hole.slot,holeType:hole.holeType||'H1',lbl});
  });

  // GL dimension between H1 pairs (group by X, find pairs of H1 slots)
  const h1ByX={};
  expanded.filter(h=>h.face==='WEB'&&h.holeType==='H1').forEach(hole=>{
    if(!h1ByX[hole.X]) h1ByX[hole.X]=[];
    h1ByX[hole.X].push(WY+(H-hole.Y)*scY);
  });
  // Pre-register GL dim boxes first
  Object.entries(h1ByX).forEach(([xmm,screenYs])=>{
    if(screenYs.length===2){
      const hx=WX+parseFloat(xmm)*scX;
      const [y1,y2]=[Math.min(...screenYs),Math.max(...screenYs)];
      // GL dim zone: x = hx+14 ถึง hx+50, y = y1 ถึง y2
      _cboxes.push([hx+12, hx+52, y1-2, y2+2]);
    }
  });
  Object.entries(h1ByX).forEach(([xmm,screenYs])=>{
    if(screenYs.length===2){
      const hx=WX+parseFloat(xmm)*scX;
      const [y1,y2]=[Math.min(...screenYs),Math.max(...screenYs)];
      const gl=getTMTRow(H).GL;
      s+=DV(hx+22,y1,y2,`GL=${fmt(gl)}`,CDIM,null,7);
    }
  });

  // ── Ribbon callouts ถูกตัดออก — ดูข้อมูลใน Hole Schedule แทน ──

  // Cut lines AFTER callouts — แสดงเฉพาะด้านขวา (lastX เท่านั้น)
  let cutLineSVG='';
  if(webCutXs.length>0){
    const lastWebX=webCutXs[webCutXs.length-1];
    cutLineSVG+=cutLine(WX+lastWebX*scX,'A',false,false);
  }
  s+=cutLineSVG;

  /* Chain dim above web view — WEB X positions ONLY */
  const webChainMm=[...new Set([0,...wHoles.map(h=>h.X),L])].sort((a,b)=>a-b);
  const webChainPts=webChainMm.map(x=>({
    x:WX+x*scX,
    lbl:x===0?'':fmt(x-(webChainMm[webChainMm.indexOf(x)-1]||0)),
    _mm:x
  }));
  webChainPts[0].lbl='';
  s+=chainDim(webChainPts, WY-DPT+16, CDIM, WY);

  /* L dim below web view */
  s+=DH(WX,WX+webPxW, WY+webPxH+DPB-4, `L = ${fmt(L)} mm`, CDIM, WY+webPxH);

  /* ════════════════════════════════════════
     TOP VIEW (PLAN) — dimension ของ TOP/BOT face
     - Chain dim: X positions ของ TOP/BOT holes
     - B1 dim (ซ้าย): ความกว้าง B1 flange
     - B2 dim (ซ้าย): ความกว้าง B2 flange
     - Callout TOP/BOT holes
     - Cut line B-B: ณ ตำแหน่ง TOP/BOT holes
     - ไม่แสดง dim ของ WEB ใน view นี้
  ════════════════════════════════════════ */
  s+=ST(WX+webPxW/2, tvY+4, 'TOP VIEW (PLAN)',8,'middle','#000','bold');

  // Flange rectangles (same X as web view)
  const tvB1h=B1*tvScale, tvB2h=B2*tvScale;
  const tvWYb1=tvWY;
  const tvWYb2=tvWY+tvB1h;
  const tvWYb2bot=tvWYb2+tvB2h;

  // B1 flange outline
  s+=SR(WX,tvWYb1,webPxW,tvB1h,COUT,.8);
  s+=SL(WX,tvWYb1,WX+webPxW,tvWYb1,COUT,1.5);         // outer edge (top)
  s+=SL(WX,tvWYb2,WX+webPxW,tvWYb2,COUT,.5,'4,3');    // web join (hidden)
  s+=SL(WX,tvWYb2bot,WX+webPxW,tvWYb2bot,COUT,1.5);   // B2 outer edge (bottom)
  s+=SL(WX,tvWYb1-4,WX,tvWYb2bot+4,COUT,.8);           // left end
  s+=SL(WX+webPxW,tvWYb1-4,WX+webPxW,tvWYb2bot+4,COUT,.8); // right end

  /* B1, B2 dims — LEFT side of Top View */
  // Pre-register left dim zone of top view
  _cboxes.push([WX-52, WX-2, tvWYb1-2, tvWYb2bot+2]);
  s+=DV(WX-16, tvWYb1, tvWYb2,    `B1=${fmt(B1)}`, CDIM, WX, 7);
  s+=DV(WX-34, tvWYb2, tvWYb2bot, `B2=${fmt(B2)}`, CDIM, WX, 7);

  /* B-B cut lines — TOP/BOT X positions ONLY */
  const topCutXs=[...new Set([...tHoles,...bHoles].map(h=>h.X))].sort((a,b)=>a-b);

  // Pre-register B-B circle — เฉพาะด้านขวา (rightmost X เท่านั้น)
  if(topCutXs.length>0){
    const lastTopX=topCutXs[topCutXs.length-1];
    const tvCutY1=tvWYb1-12-9, tvCutY2=tvWYb2bot+12+9;
    blockCircle(WX+lastTopX*scX, tvCutY1, 9);
    blockCircle(WX+lastTopX*scX, tvCutY2, 9);
  }

  /* TOP face holes — ใส่สีตาม H2 style */
  const h2hs=holeStyle('H2');
  const maxTopX=tHoles.length>0 ? Math.max(...tHoles.map(h=>h.X)) : null;
  tHoles.forEach((hole)=>{
    const hx=WX+hole.X*scX;
    const cy=tvWYb1+tvB1h/2;
    if(hole.slot){
      const slotHpx=Math.max(SLOT_DH/2*tvScale,4);
      const slotWpx=Math.max(SLOT_WH/2*tvScale,6);
      s+=`<ellipse cx="${r(hx)}" cy="${r(cy)}" rx="${r(slotWpx,2)}" ry="${r(slotHpx,2)}" stroke="${h2hs.stroke}" stroke-width="0.8" fill="${h2hs.fill}"/>`;
    } else {
      s+=SC(hx,cy,Math.max(hole.dia/2*Math.min(scX,tvScale),3),h2hs.stroke,.7,h2hs.fill);
    }
    s+=SL(hx-3,cy,hx+3,cy,h2hs.stroke,.4,'3,2');
    s+=SL(hx,cy-3,hx,cy+3,h2hs.stroke,.4,'3,2');
  });

  /* BOT face holes — ใส่สีตาม H2 style */
  const maxBotX=bHoles.length>0 ? Math.max(...bHoles.map(h=>h.X)) : null;
  bHoles.forEach((hole)=>{
    const hx=WX+hole.X*scX;
    const cy=tvWYb2+tvB2h/2;
    if(hole.slot){
      const slotHpx=Math.max(SLOT_DH/2*tvScale,4);
      const slotWpx=Math.max(SLOT_WH/2*tvScale,6);
      s+=`<ellipse cx="${r(hx)}" cy="${r(cy)}" rx="${r(slotWpx,2)}" ry="${r(slotHpx,2)}" stroke="${h2hs.stroke}" stroke-width="0.8" fill="${h2hs.fill}" stroke-dasharray="3,2"/>`;
    } else {
      s+=`<circle cx="${r(hx)}" cy="${r(cy)}" r="${r(Math.max(hole.dia/2*Math.min(scX,tvScale),3),2)}" stroke="${h2hs.stroke}" stroke-width="0.7" fill="${h2hs.fill}" stroke-dasharray="3,2"/>`;
    }
  });

  // B-B cut lines — แสดงเฉพาะด้านขวา (lastX เท่านั้น)
  let tvCutSVG='';
  if(topCutXs.length>0){
    const tvCutY1=tvWYb1-12, tvCutY2=tvWYb2bot+12;
    const mkTVCutLine=(hx,lbl,goRight)=>{
      let cs='';
      cs+=SL(hx,tvCutY1,hx,tvCutY2,'#333',.65,'8,3,2,3');
      const ax=goRight?hx+10:hx-10;
      cs+=`<polygon points="${r(ax)},${r(tvCutY2)} ${r(hx+(goRight?3:-3))},${r(tvCutY2-5)} ${r(hx+(goRight?3:-3))},${r(tvCutY2+5)}" fill="#333" stroke="none"/>`;
      const mkC=(cx,cy)=>{cs+=SC(cx,cy,7,'#333',.75,'white');cs+=ST(cx,cy+3.5,lbl,7.5,'middle','#000','bold');};
      mkC(hx,tvCutY1-9);
      mkC(hx,tvCutY2+9);
      return cs;
    };
    const lastTopX=topCutXs[topCutXs.length-1];
    tvCutSVG+=mkTVCutLine(WX+lastTopX*scX,'B',false);
  }
  s+=tvCutSVG;

  /* Chain dim above top view profile — อยู่ใน TV zone (เหนือ profile) */
  if(tHoles.length>0||bHoles.length>0){
    const tvChainMm=[...new Set([0,...[...tHoles,...bHoles].map(h=>h.X),L])].sort((a,b)=>a-b);
    const tvChainPts=tvChainMm.map(x=>({
      x:WX+x*scX,
      lbl:x===0?'':fmt(x-(tvChainMm[tvChainMm.indexOf(x)-1]||0)),
      _mm:x
    }));
    tvChainPts[0].lbl='';
    // วาง chain dim เหนือ profile (tvWYb1-22) ซึ่งมี space เพียงพอจาก TV_PAD_T=38
    _cboxes.push([WX-4, WX+webPxW+4, tvY, tvWYb1-2]);
    s+=chainDim(tvChainPts, tvWYb1-22, CDIM, tvWYb1);
  }

  /* ════════════════════════
     SECTION VIEWS
  ════════════════════════ */
  if(wHoles.length>0||holes.length>0)
    s+=drawSection(secAx, secAy, H, B1, B2eff, D, secSc, wHoles, 'A - A', `1:${r(1/secSc,1)}`, true, isC);
  if(hasSecB)
    s+=drawSection(secBx, secBy, H, B1, B2eff, D, secSc, [...tHoles,...bHoles], 'B - B', `1:${r(1/secSc,1)}`, false, isC, SCH_X-8);

  /* ══ HOLE SCHEDULE ══
     เรียงตาม X → ภายใน X เดียวกัน เรียง T,W,B
     จำนวนรูต่อ hole type: H1=2 slots, H2=2 slots (T+B), H3=1 hole
  ══ */
  // กลุ่ม holes โดย X (รวม H2 ที่มี TOP+BOT ที่ X เดียวกัน)
  // นับ raw rows จาก input table (ก่อน expand เป็น individual face holes)
  // ใช้ rawHoles เพื่อ deduplicate H2 (TOP+BOT ที่ X เดียวกัน = 1 row)
  const rawRows=Array.from(document.getElementById('htbody').querySelectorAll('tr')).map(tr=>{
    const inp=tr.querySelectorAll('input,select');
    // inp[0]=qty, inp[1]=face(select), inp[2]=X(.x-inp), inp[3]=SP(.sp-inp), inp[4]=type(select)
    const qty=+inp[0].value||1;
    const face=tr.querySelector('.face-sel')?.value||'WEB';
    const X=parseFloat(tr.querySelector('.x-inp')?.value)||0;
    const holeType=tr.querySelector('.type-sel')?.value||'H1';
    return{qty,face,X,holeType};
  });

  // สร้าง schedule rows ที่ถูกต้อง
  // H2 → แยก 2 บรรทัด (T และ B)
  // H1 → 1 บรรทัด face W จำนวน 2 รู
  // เรียงลำดับ T → W → B
  const schedRows=[];
  rawRows.forEach(row=>{
    if(row.holeType==='H2'){
      // H2 = แยก 2 บรรทัด: T (B1) และ B (B2)
      schedRows.push({...row, face:'T', holeCount:1,
        shapeDisp:`${SLOT_DH}×${SLOT_WH} Slot`,
        yDisp:'(B1)'});
      schedRows.push({...row, face:'B', holeCount:1,
        shapeDisp:`${SLOT_DH}×${SLOT_WH} Slot`,
        yDisp:'(B2)'});
    } else if(row.holeType==='H1'){
      // H1 = 1 บรรทัด face W จำนวน 2 รู
      schedRows.push({...row, face:'W', holeCount:2,
        shapeDisp:`${SLOT_DH}×${SLOT_WH} Slot`,
        yDisp:fmt(H/2-getTMTRow(H).GL/2)+'/'+fmt(H/2+getTMTRow(H).GL/2)});
    } else if(row.holeType==='H3'){
      schedRows.push({...row, face:'W', holeCount:1,
        shapeDisp:`Ø${fmt(18)} Hole`,
        yDisp:fmt(Math.round(H/2))});
    } else if(row.face==='TOP'){
      schedRows.push({...row, face:'T', holeCount:1,
        shapeDisp:`${SLOT_DH}×${SLOT_WH} Slot`, yDisp:'(B1)'});
    } else if(row.face==='BOT'){
      schedRows.push({...row, face:'B', holeCount:1,
        shapeDisp:`${SLOT_DH}×${SLOT_WH} Slot`, yDisp:'(B2)'});
    } else {
      schedRows.push({...row, face:'W', holeCount:1,
        shapeDisp:`${SLOT_DH}×${SLOT_WH} Slot`, yDisp:fmt(H/2)});
    }
  });

  // เรียง: W → T → B (face), ภายใน face เรียง H1→H2→H3 (type), แล้ว X น้อย→มาก
  const faceOrder={'W':0,'T':1,'B':2};
  const typeOrder={'H1':0,'H2':1,'H3':2,'TOP':1,'BOT':2};
  schedRows.sort((a,b)=>{
    const fo=(faceOrder[a.face]??3)-(faceOrder[b.face]??3);
    if(fo!==0) return fo;
    const to=(typeOrder[a.holeType]??9)-(typeOrder[b.holeType]??9);
    if(to!==0) return to;
    return a.X-b.X;
  });

  const schY=divY+6;
  // ใช้พื้นที่ SCH_W ทั้งหมด (จาก SCH_X ถึง right margin)
  const schedStartX=SCH_X-4;
  const schedAvailW=SW-MR-schedStartX;

  // แบ่งคอลัมน์ให้กว้างเท่ากันตาม ratio — N และ หน้า แคบกว่า
  const colDefs=[
    {h:'N',       ratio:0.5},
    {h:'หน้า',    ratio:0.7},
    {h:'X (mm)',  ratio:1.2},
    {h:'Type',    ratio:0.8},
    {h:'จำนวนรู', ratio:0.8},
    {h:'Y (mm)',  ratio:1.2},
    {h:'Shape',   ratio:1.8},
  ];
  const totalRatio=colDefs.reduce((a,c)=>a+c.ratio,0);
  const unitW=schedAvailW/totalRatio;
  const scols=colDefs.map(c=>({...c, w:Math.round(c.ratio*unitW)}));
  // fix rounding: ปรับ col สุดท้ายให้รวมได้พอดี
  const usedW=scols.slice(0,-1).reduce((a,c)=>a+c.w,0);
  scols[scols.length-1].w=schedAvailW-usedW;

  // Background + title
  s+=SR(schedStartX,schY,schedAvailW,TB_Y-schY-6,'#ccc',.5,'#fafaf7');
  s+=ST(schedStartX+schedAvailW/2,schY+10,'HOLE SCHEDULE',8,'middle','#000','bold');

  const SCH_ROW_H=11;
  const thY2=schY+14;
  let cx2=schedStartX;
  scols.forEach(col=>{
    s+=SR(cx2,thY2,col.w,SCH_ROW_H+2,'#aaa',.4,'#e0dbbf');
    s+=ST(cx2+col.w/2,thY2+SCH_ROW_H-1,col.h,5.5,'middle','#444','bold');
    cx2+=col.w;
  });

  schedRows.forEach((h,i)=>{
    const ry=thY2+(SCH_ROW_H+2)*(i+1);
    const bg=i%2===0?'#fafaf7':'#eee8d4';
    const vals=[String(i+1), h.face, fmt(h.X), h.holeType||'—',
                String(h.holeCount), h.yDisp, h.shapeDisp];
    cx2=schedStartX;
    scols.forEach((col,j)=>{
      s+=SR(cx2,ry,col.w,SCH_ROW_H+2,'#ddd',.3,bg);
      // font size ปรับตาม column width
      const fs=col.w<28?5.5:col.w<40?6:6.5;
      s+=ST(cx2+col.w/2,ry+SCH_ROW_H-1,vals[j],fs,'middle','#111');
      cx2+=col.w;
    });
  });
  if(!schedRows.length) s+=ST(schedStartX+schedAvailW/2,thY2+24,'(ยังไม่มีรูเจาะ)',8,'middle','#bbb');

  /* ── HOLE TYPE LEGEND — มุมซ้ายล่างของ Section zone ── */
  {
    const LEG=[
      {type:'H1',label:'H1 — Web slot (×2)'},
      {type:'H2',label:'H2 — Flange slot (T+B)'},
      {type:'H3',label:'H3 — Web circle'},
    ];
    const lh=12, lgap=3, lbgW=152;
    const totalH=LEG.length*(lh+lgap)+4;
    // มุมซ้ายล่าง: X = ML+4, Y = TB_Y - totalH - 8
    const lx=ML+4;
    const ly=TB_Y-totalH-8;
    s+=`<rect x="${r(lx)}" y="${r(ly-2)}" width="${lbgW}" height="${totalH}" rx="3" fill="#f8f8f4" stroke="#ccc" stroke-width="0.5"/>`;
    LEG.forEach((item,i)=>{
      const hs=holeStyle(item.type);
      const iy=ly+i*(lh+lgap)+lh/2+1;
      s+=SC(lx+10, iy, 4, hs.stroke, .7, hs.fill);
      s+=ST(lx+18, iy+3.5, item.label, 7.5, 'start', hs.stroke, 'bold');
    });
  }

  /* ══ TITLE BLOCK ══ */
  s+=drawTitleBlock(tb,purlinLabel,TB_Y, _curPage+1, _pages.length);

  document.getElementById('svg-out').innerHTML=s;
  // บันทึก SVG ลง page ปัจจุบัน + อัปเดต tab indicator
  if(_pages[_curPage]){ _pages[_curPage].svg=s; _renderTabs(); }
}

/* ════════════════════════════════════════════
   PAGE SYSTEM — multi-page drawing manager
════════════════════════════════════════════ */
let _pages = [];
let _curPage = 0;
let _pgCtr = 1;

const PAGE_DEFAULTS = {pL:6000,pH:152,pt:2.3,pB1:65,pB2:65,pD:20,
  tbProj:'TMT Steel PCL',tbNo:'Z-HDG-001',tbRev:'0',tbBy:'',tbQty:'1',tbDate:'',tbNote:'ทุกขนาดหน่วย mm.'};

function _captureState(){
  const ids=['pL','pH','pt','pB1','pB2','pD','tbProj','tbNo','tbRev','tbBy','tbQty','tbDate','tbNote'];
  const inputs={};
  ids.forEach(id=>{const el=document.getElementById(id); if(el) inputs[id]=el.value;});
  const holes=Array.from(document.getElementById('htbody').querySelectorAll('tr')).map(tr=>{
    return{
      qty: tr.querySelector('input[type=number]')?.value||1,
      face: tr.querySelector('.face-sel')?.value||'WEB',
      X:   tr.querySelector('.x-inp')?.value||'',
      Y:   tr.querySelector('.y-inp')?.value||'',
      holeType: tr.querySelector('.type-sel')?.value||'H1'
    };
  });
  const svg=document.getElementById('svg-out').innerHTML;
  return{inputs,holes,svg};
}

function _applyState(st){
  if(!st) return;
  const ids=['pL','pH','pt','pB1','pB2','pD','tbProj','tbNo','tbRev','tbBy','tbQty','tbDate','tbNote'];
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(el&&st.inputs&&st.inputs[id]!==undefined) el.value=st.inputs[id];
  });
  document.getElementById('htbody').innerHTML=''; _hcnt=0;
  (st.holes||[]).forEach(h=>addHole(+h.qty||1,h.face||'WEB',h.X||'',h.holeType||'H1',h.Y||null));
  recalcAllSP();
  if(st.svg) document.getElementById('svg-out').innerHTML=st.svg;
}

function _renderTabs(){
  const inner=document.getElementById('page-tabs-inner');
  inner.innerHTML=_pages.map((pg,i)=>`
    <button class="pg-tab${i===_curPage?' active':''}" onclick="switchPage(${i})">
      ${pg.label}${pg.svg?'  ✓':''}
      ${_pages.length>1?`<span class="pg-del" onclick="event.stopPropagation();deletePage(${i})">✕</span>`:''}
    </button>`).join('');
}

function _pgLabel(){ return `P${_pgCtr}`; }

window.addPage=function(){
  // save current page
  _pages[_curPage]={..._pages[_curPage],..._captureState()};
  // new blank page
  _pgCtr++;
  const inputs={...PAGE_DEFAULTS, tbNo:'Z-HDG-00'+_pgCtr};
  _pages.push({label:_pgLabel(),inputs,holes:[
    {qty:'1',face:'WEB',X:'35',holeType:'H1'},
    {qty:'1',face:'WEB',X:'35',holeType:'H2'},
    {qty:'1',face:'WEB',X:'5965',holeType:'H1'},
    {qty:'1',face:'WEB',X:'5965',holeType:'H2'},
  ],svg:''});
  _curPage=_pages.length-1;
  _applyState(_pages[_curPage]);
  _g0=false;
  _renderTabs();
};

window.switchPage=function(idx){
  if(idx===_curPage) return;
  _pages[_curPage]={..._pages[_curPage],..._captureState()};
  _curPage=idx;
  _applyState(_pages[_curPage]);
  _g0=!!_pages[_curPage]?.svg;
  _renderTabs();
};

window.deletePage=function(idx){
  if(_pages.length<=1) return;
  if(!confirm(`ลบ ${_pages[idx].label} ?`)) return;
  _pages.splice(idx,1);
  _curPage=Math.min(_curPage,_pages.length-1);
  _applyState(_pages[_curPage]);
  _g0=!!_pages[_curPage]?.svg;
  _renderTabs();
};

window.printAll=function(){
  if(!_approved){ alert('กรุณาเข้าสู่ระบบและได้รับการอนุมัติก่อนใช้งาน'); return; }
  // บันทึก state page ปัจจุบัน + generate
  _pages[_curPage]={..._pages[_curPage],..._captureState()};
  generate();
  _pages[_curPage].svg=document.getElementById('svg-out').innerHTML;

  const PLACEHOLDER='กรอกข้อมูล';
  // จับ origPage ก่อน loop (bug fix)
  const origPage=_curPage;

  // Generate ทุก page ที่ยังไม่มี svg
  _pages.forEach((pg,i)=>{
    if(!pg.svg||pg.svg.includes(PLACEHOLDER)){
      const saved=_captureState();
      _applyState(pg);
      _curPage=i;
      generate();
      _pages[i].svg=document.getElementById('svg-out').innerHTML;
      _applyState(saved);
    }
  });

  // คืนค่า state + _curPage เดิม
  _curPage=origPage;
  _applyState(_pages[origPage]);
  _renderTabs();

  const pagesToPrint=_pages.filter(pg=>pg.svg&&!pg.svg.includes(PLACEHOLDER));
  if(!pagesToPrint.length){ alert('กรุณากด ▶ สร้าง Drawing ก่อน'); return; }

  const container=document.getElementById('print-all');
  container.innerHTML=pagesToPrint.map(pg=>`
    <div class="print-page">
      <svg width="1190" height="841" viewBox="0 0 1190 841" overflow="hidden"
           xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto">
        ${pg.svg}
      </svg>
    </div>`).join('');

  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    const drawNo=document.getElementById('tbNo')?.value||'';
    _logActivity('print',{pages:pagesToPrint.length,drawNo,
      type:document.getElementById('pType')?.value||'Z',
      size:document.getElementById('pSize')?.value||''});
    window.print();
  }); });
};

/* ── Auto-generate (debounced, after first press) ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&_loadOpen) toggleProjectPanel();
});
let _deb=null,_g0=false;
document.getElementById('panel').addEventListener('input',()=>{
  if(!_g0) return;
  clearTimeout(_deb); _deb=setTimeout(generate,700);
});
const _G=generate;
window.generate=function(){
  if(!_approved){ alert('กรุณาเข้าสู่ระบบและได้รับการอนุมัติก่อนใช้งาน'); return; }
  _g0=true; _G();
  // Log generate (debounced — ไม่ log ทุก auto-refresh)
  clearTimeout(window._logGenTimer);
  window._logGenTimer=setTimeout(()=>{
    const L=document.getElementById('pL')?.value;
    const H=document.getElementById('pH')?.value;
    const type=document.getElementById('pType')?.value||'Z';
    const size=document.getElementById('pSize')?.value||'';
    _logActivity('generate',{type,size,H,L,pages:_pages.length});
  },2000);
};

</script>
