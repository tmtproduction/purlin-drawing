<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — TMT Purlin Drawing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════
     FIREBASE SDK — ใช้ config เดียวกับ index.html
═══════════════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup,
         signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs,
         updateDoc, query, orderBy, setDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ▼▼▼ วาง config เดียวกับ index.html ที่นี่ ▼▼▼
const firebaseConfig = {
  apiKey:            "AIzaSyDGmOh_n3q3ae8eeyL6uejrnMq11y67JSc",
  authDomain:        "tmt-purlin-drawing.firebaseapp.com",
  projectId:         "tmt-purlin-drawing",
  storageBucket:     "tmt-purlin-drawing.firebasestorage.app",
  messagingSenderId: "884818448446",
  appId:             "1:884818448446:web:d51a032e0d518aa153816f"
};
// ▲▲▲ วาง config ที่นี่ ▲▲▲

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const gp   = new GoogleAuthProvider();

// ─── Auth State ───
onAuthStateChanged(auth, async user => {
  if (!user) {
    // ยังไม่ได้ login
    document.getElementById('auth-check').innerHTML = `
      <div style="text-align:center">
        <div style="color:#8b949e;font-family:'Share Tech Mono',monospace;
          font-size:12px;margin-bottom:16px">TMT PURLIN — ADMIN</div>
        <button onclick="doSignIn()"
          style="background:#58a6ff;color:#000;border:none;padding:10px 24px;
          border-radius:4px;font-family:'Rajdhani',sans-serif;font-weight:700;
          font-size:13px;cursor:pointer;letter-spacing:1px">
          🔑 Sign in with Google
        </button>
      </div>`;
    return;
  }

  // ตรวจสอบ role
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists() || snap.data().role !== 'admin') {
    document.getElementById('auth-check').innerHTML = `
      <div style="text-align:center;font-family:'Share Tech Mono',monospace">
        <div style="color:#f85149;font-size:13px;margin-bottom:8px">❌ ไม่มีสิทธิ์ Admin</div>
        <div style="color:#8b949e;font-size:11px">${user.email}</div>
        <button onclick="doSignOut()"
          style="margin-top:16px;background:transparent;color:#8b949e;
          border:1px solid #21262d;padding:6px 14px;border-radius:3px;
          font-size:11px;cursor:pointer">Sign out</button>
      </div>`;
    return;
  }

  // Admin confirmed
  document.getElementById('auth-check').style.display = 'none';
  document.getElementById('admin-app').style.display  = '';
  document.getElementById('ab-email').textContent = user.email;
  loadUsers();
});

window.doSignIn  = () => signInWithPopup(auth, gp).catch(e => alert(e.message));
window.doSignOut = () => signOut(auth).then(() => location.reload());

// ─── TABS ───
window.switchTab = tab => {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['users','drawings'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + tab).style.display = '';
  if (tab === 'drawings') loadAllDrawings();
};

// ─── USERS ───
let _users = {};

window.loadUsers = async function () {
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="color:#8b949e;text-align:center;padding:20px">กำลังโหลด...</td></tr>';
  const snap = await getDocs(collection(db, 'users'));
  _users = {};
  const rows = [];
  snap.forEach(d => {
    _users[d.id] = d.data();
    const u    = d.data();
    const date = new Date(u.createdAt || 0).toLocaleDateString('th-TH');
    const sClass = u.status === 'approved' ? 'badge-approved'
                 : u.status === 'rejected' ? 'badge-rejected' : 'badge-pending';
    const rClass = 'badge-' + (u.role || 'engineer');
    rows.push(`<tr>
      <td>${u.displayName || '—'}</td>
      <td>${u.email}</td>
      <td>
        <select onchange="updateRole('${d.id}',this.value)" class="sel">
          ${['admin','engineer','operator'].map(r =>
            `<option${u.role===r?' selected':''}>${r}</option>`).join('')}
        </select>
      </td>
      <td><span class="badge ${sClass}">${u.status || 'pending'}</span></td>
      <td>${date}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        ${u.status !== 'approved'
          ? `<button class="btn btn-approve" onclick="setStatus('${d.id}','approved')">✓ Approve</button>` : ''}
        ${u.status !== 'rejected'
          ? `<button class="btn btn-reject"  onclick="setStatus('${d.id}','rejected')">✕ Reject</button>`  : ''}
        ${u.status !== 'pending'
          ? `<button class="btn btn-ghost"   onclick="setStatus('${d.id}','pending')">Reset</button>`      : ''}
      </td>
    </tr>`);
  });
  tbody.innerHTML = rows.length ? rows.join('') :
    '<tr><td colspan="6" style="color:#8b949e;text-align:center;padding:20px">ยังไม่มี users</td></tr>';
};

window.setStatus = async (uid, status) => {
  await updateDoc(doc(db, 'users', uid), { status });
  loadUsers();
};

window.updateRole = async (uid, role) => {
  await updateDoc(doc(db, 'users', uid), { role });
};

// ─── ALL DRAWINGS ───
window.loadAllDrawings = async function () {
  const tbody = document.getElementById('drawings-tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="color:#8b949e;text-align:center;padding:20px">กำลังโหลด...</td></tr>';
  try {
    const snap = await getDocs(query(collection(db, 'drawings'), orderBy('savedAt', 'desc')));
    const rows = [];
    snap.forEach(d => {
      const dd   = d.data();
      const user = _users[dd.uid];
      const date = new Date(dd.savedAt || 0).toLocaleDateString('th-TH');
      rows.push(`<tr>
        <td style="color:#58a6ff;font-weight:700">${dd.name}</td>
        <td>${user?.displayName || dd.email || dd.uid?.slice(0,8)}</td>
        <td>Z-${dd.inputs?.pH}×${dd.inputs?.pB1}×${dd.inputs?.pB2}</td>
        <td>${dd.inputs?.pL} mm</td>
        <td>${dd.inputs?.tbProj || '—'}</td>
        <td>${date}</td>
      </tr>`);
    });
    tbody.innerHTML = rows.length ? rows.join('') :
      '<tr><td colspan="6" style="color:#8b949e;text-align:center;padding:20px">ยังไม่มี drawings</td></tr>';
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:#f85149">${e.message}</td></tr>`;
  }
};
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--panel:#161b22;--border:#21262d;
  --accent:#58a6ff;--text:#e6edf3;--dim:#8b949e;
  --green:#3fb950;--red:#f85149}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Auth check overlay */
#auth-check{display:flex;align-items:center;justify-content:center;height:100vh}

/* Top bar */
.topbar{background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 20px;height:46px;display:flex;align-items:center;gap:10px}
.topbar .logo{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:2px}
.topbar .spacer{flex:1}
.topbar span{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}

/* Container */
.container{padding:20px;max-width:1200px;margin:0 auto}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab-btn{padding:7px 18px;border:1px solid var(--border);border-radius:3px;
  cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;background:transparent;color:var(--dim);
  font-family:'Rajdhani',sans-serif;transition:all .15s}
.tab-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.tab-btn:not(.active):hover{border-color:var(--accent);color:var(--accent)}

/* Table */
.table-wrap{background:var(--panel);border:1px solid var(--border);
  border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse;
  font-family:'Share Tech Mono',monospace;font-size:11px}
th{background:var(--bg);color:var(--accent);padding:10px 12px;text-align:left;
  border-bottom:1px solid var(--border);font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase}
td{padding:10px 12px;border-bottom:1px solid var(--border);
  color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(88,166,255,.04)}

/* Badge */
.badge{display:inline-block;padding:2px 9px;border-radius:10px;
  font-size:9px;font-weight:700;letter-spacing:.5px}
.badge-pending  {background:rgba(248,211,73,.15);color:#f8d349}
.badge-approved {background:rgba(63,185,80,.15); color:#3fb950}
.badge-rejected {background:rgba(248,81,73,.15); color:#f85149}
.badge-admin    {background:rgba(88,166,255,.2); color:#58a6ff}
.badge-engineer {background:rgba(63,185,80,.12); color:#7ee787}
.badge-operator {background:rgba(210,153,34,.12);color:#d2991e}

/* Buttons */
.btn{padding:4px 10px;border:none;border-radius:3px;cursor:pointer;
  font-size:9px;font-weight:700;font-family:'Rajdhani',sans-serif;
  letter-spacing:.8px;text-transform:uppercase;transition:all .15s}
.btn-approve{background:var(--green);color:#000}
.btn-approve:hover{background:#56d364}
.btn-reject {background:var(--red);color:#fff}
.btn-reject:hover{opacity:.85}
.btn-ghost  {background:transparent;border:1px solid var(--border);color:var(--dim)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* Select */
.sel{background:var(--bg);color:var(--text);border:1px solid var(--border);
  padding:3px 6px;border-radius:3px;font-size:10px;
  font-family:'Share Tech Mono',monospace}

/* Stats bar */
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:var(--panel);border:1px solid var(--border);
  border-radius:6px;padding:12px 18px;min-width:120px}
.stat-card .num{font-size:22px;font-weight:700;color:var(--accent);
  font-family:'Share Tech Mono',monospace}
.stat-card .lbl{font-size:9px;color:var(--dim);letter-spacing:1px;
  text-transform:uppercase;margin-top:2px}
</style>
</head>
<body>

<!-- Auth check -->
<div id="auth-check">
  <div style="text-align:center;font-family:'Share Tech Mono',monospace">
    <div style="color:var(--dim);font-size:12px">กำลังตรวจสอบสิทธิ์...</div>
  </div>
</div>

<!-- Admin App -->
<div id="admin-app" style="display:none">

  <!-- Top bar -->
  <div class="topbar">
    <span class="logo">⚙ TMT PURLIN — ADMIN</span>
    <span class="spacer"></span>
    <span id="ab-email"></span>
    <button onclick="doSignOut()" class="btn btn-ghost" style="font-size:10px">Sign out</button>
    <a href="index.html" class="btn btn-ghost"
      style="text-decoration:none;font-size:10px;font-family:'Rajdhani',sans-serif;
      font-weight:700;letter-spacing:.8px">← Drawing Tool</a>
  </div>

  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('users')">👥 Users</button>
      <button class="tab-btn"        onclick="switchTab('drawings')">📄 All Drawings</button>
    </div>

    <!-- USERS PANEL -->
    <div id="panel-users" class="tab-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ชื่อ</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>สมัครเมื่อ</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="6" style="color:var(--dim);text-align:center;padding:20px">กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- DRAWINGS PANEL -->
    <div id="panel-drawings" class="tab-panel" style="display:none">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ชื่อ Drawing</th>
              <th>โดย</th>
              <th>Purlin Size</th>
              <th>Length</th>
              <th>Project</th>
              <th>บันทึกเมื่อ</th>
            </tr>
          </thead>
          <tbody id="drawings-tbody">
            <tr><td colspan="6" style="color:var(--dim);text-align:center;padding:20px">กด tab เพื่อโหลด</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

</body>
</html>
